<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Impetus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1F6; --surface:#FFFFFF; --ink:#16202E; --muted:#6B7686; --faint:#9AA4B2; --line:#E3E7EE;
    --primary:#2747D9; --primary-press:#1c37b3; --primary-soft:#E8ECFD;
    --ok:#0E9F6E; --ok-soft:#E3F4EC; --warn:#C77700; --warn-soft:#FBF0DC;
    --danger:#D92D20; --danger-soft:#FDECEA; --off:#7A8696; --off-soft:#EDEFF3;
    --shadow:0 1px 2px rgba(16,32,55,.06), 0 8px 24px rgba(16,32,55,.07);
    --sheet-shadow:0 -8px 40px rgba(16,32,55,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',system-ui,sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; display:flex; justify-content:center}
  .app{width:100%; max-width:440px; min-height:100vh; background:var(--bg); position:relative}
  .hide{display:none !important}

  #login{padding:0 22px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; max-width:440px; margin:0 auto}
  .lg-brand{display:flex; align-items:center; gap:11px; margin-bottom:28px}
  .lg-brand .logo{width:44px; height:44px; border-radius:13px; background:linear-gradient(150deg,var(--primary),#6b81f5); display:grid; place-items:center; color:#fff; font-weight:800; font-size:21px; box-shadow:0 6px 16px rgba(39,71,217,.32)}
  .lg-brand .t .n{font-weight:800; font-size:22px; letter-spacing:-.02em} .lg-brand .t .n span{color:var(--primary)}
  .lg-brand .t .s{font-size:13px; color:var(--muted); margin-top:2px}
  #login h1{font-size:24px; font-weight:800; letter-spacing:-.03em; margin:0 0 4px}
  #login .sub{color:var(--muted); font-size:14px; margin:0 0 22px}

  .field{margin-top:14px}
  .field label{display:block; font-size:13px; font-weight:600; color:#3a4660; margin-bottom:6px}
  .field label .req{color:var(--primary)}
  .field input,.field select,.field textarea{width:100%; font:inherit; font-size:15px; color:var(--ink); background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 13px; outline:0; transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .field .hint{font-size:12px; color:var(--faint); margin-top:6px}
  .two{display:flex; gap:11px} .two>*{flex:1}

  .bigbtn{width:100%; margin-top:22px; background:var(--primary); color:#fff; border:0; border-radius:13px; padding:15px; font:inherit; font-size:15.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px}
  .bigbtn:active{background:var(--primary-press)} .bigbtn:disabled{opacity:.6}
  .lg-err{margin-top:14px; background:var(--danger-soft); color:#8a231a; border-radius:11px; padding:11px 13px; font-size:13px; font-weight:600; display:none} .lg-err.show{display:block}

  .topbar{position:sticky; top:0; z-index:30; background:rgba(238,241,246,.86); backdrop-filter:blur(12px); padding:14px 18px 8px; border-bottom:1px solid var(--line)}
  .brand{display:flex; align-items:center; gap:9px}
  .logo{width:30px; height:30px; border-radius:9px; background:linear-gradient(150deg,var(--primary),#6b81f5); display:grid; place-items:center; color:#fff; font-weight:800; font-size:15px; box-shadow:0 4px 10px rgba(39,71,217,.3)}
  .brand .name{font-weight:800; font-size:17px; letter-spacing:-.02em} .brand .name span{color:var(--primary)}
  .brand .me{margin-left:auto; display:flex; align-items:center; gap:8px}
  .brand .me .who{text-align:right; font-size:11.5px; line-height:1.25}
  .brand .me .who b{font-weight:700; font-size:12.5px} .brand .me .who .r{color:var(--muted); font-weight:600}
  .iconbtn{width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--muted)}
  .titlerow{display:flex; align-items:baseline; gap:9px; margin-top:14px}
  .titlerow h1{font-size:25px; font-weight:800; letter-spacing:-.03em; margin:0}
  .titlerow .count{font-size:13px; font-weight:600; color:var(--muted); background:var(--surface); border:1px solid var(--line); padding:2px 9px; border-radius:999px}

  .controls{padding:12px 18px 6px}
  .search{display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:11px 13px; box-shadow:var(--shadow)}
  .search:focus-within{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .search svg{flex:none; color:var(--faint)}
  .search input{border:0; outline:0; width:100%; font:inherit; font-size:15px; background:transparent; color:var(--ink)}
  .filters{display:flex; gap:7px; margin-top:11px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none} .filters::-webkit-scrollbar{display:none}
  .chip{flex:none; border:1px solid var(--line); background:var(--surface); color:var(--muted); font:inherit; font-size:13px; font-weight:600; padding:7px 13px; border-radius:999px; cursor:pointer; transition:.15s}
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink)}
  .chip.hb{border-color:#F1C7C2} .chip .cnt{display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 4px; margin-left:5px; border-radius:99px; background:var(--danger); color:#fff; font-size:10.5px; font-weight:700}

  .list{padding:8px 14px 150px; display:flex; flex-direction:column; gap:10px}

  /* student card */
  .scard{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:13px 14px; box-shadow:var(--shadow); display:flex; gap:12px; align-items:center; cursor:pointer; transition:transform .12s}
  .scard:active{transform:scale(.985)}
  .avatar{width:46px; height:46px; flex:none; border-radius:13px; display:grid; place-items:center; font-weight:700; font-size:17px; color:#fff}
  .who{flex:1; min-width:0} .who .nm{font-weight:700; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .who .sub{display:flex; align-items:center; gap:7px; margin-top:5px; flex-wrap:wrap}
  .idtag{display:inline-flex; align-items:center; gap:5px; font-family:'Spline Sans Mono',monospace; font-weight:600; font-size:12px; color:#27324a; background:#F1F3F8; border:1px solid #E0E4EC; padding:2px 7px 2px 6px; border-radius:7px} .idtag svg{color:var(--primary)}
  .phone{font-size:12px; color:var(--muted); font-weight:500}
  .lopchip{font-size:11.5px; font-weight:600; color:#3a4660; background:var(--primary-soft); padding:2px 8px; border-radius:6px}
  .pill{flex:none; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:999px}
  .pill.dang_hoc,.pill.hoc{color:var(--ok); background:var(--ok-soft)} .pill.bao_luu,.pill.luu{color:var(--warn); background:var(--warn-soft)} .pill.da_nghi,.pill.nghi{color:var(--off); background:var(--off-soft)}
  .pill.cho_test{color:#7C3AED; background:#F1EBFC} .pill.hoc_thu{color:#0E7490; background:#E1F1F6}

  /* class card */
  .ccard{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow); cursor:pointer; transition:transform .12s} .ccard:active{transform:scale(.99)}
  .ctop{display:flex; align-items:flex-start; gap:11px}
  .ico{width:44px; height:44px; flex:none; border-radius:13px; display:grid; place-items:center; color:#fff; font-weight:800; font-size:13px}
  .ctitle{flex:1; min-width:0} .ctitle .nm{font-weight:700; font-size:16px} .ctitle .meta{display:flex; align-items:center; gap:7px; margin-top:4px; color:var(--muted); font-size:13px; font-weight:500} .ctitle .meta .dot{width:3px;height:3px;border-radius:99px;background:var(--faint)}
  .clbl{flex:none; font-size:11px; font-weight:700; padding:4px 9px; border-radius:999px}
  .clbl.dang_hoc{color:var(--ok); background:var(--ok-soft)} .clbl.dang_tuyen{color:var(--warn); background:var(--warn-soft)} .clbl.da_dong{color:var(--off); background:var(--off-soft)}
  .week{display:flex; gap:4px; margin-top:13px} .day{flex:1; text-align:center; font-size:11px; font-weight:600; padding:5px 0; border-radius:7px; background:#F1F3F8; color:#A7B0BE} .day.on{background:var(--primary-soft); color:var(--primary)}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow); margin-bottom:10px}
  .det-actions{display:flex; gap:8px; flex:none}
  .icobtn{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--primary)} .icobtn:active{background:var(--primary-soft)}
  .acc{border:1px solid var(--line); border-radius:14px; margin-top:10px; overflow:hidden; background:var(--surface)}
  .acc-h{width:100%; display:flex; align-items:center; gap:8px; padding:13px 14px; border:0; background:transparent; font:inherit; font-size:14.5px; font-weight:700; color:var(--ink); cursor:pointer; text-align:left}
  .acc-h .chev{margin-left:auto; color:var(--faint); transition:transform .2s} .acc.open .acc-h .chev{transform:rotate(180deg)}
  .acc-badge{font-size:11.5px; font-weight:700; color:var(--danger); background:var(--danger-soft); padding:2px 8px; border-radius:999px}
  .acc-b{display:none; padding:0 14px 14px} .acc.open .acc-b{display:block} .acc-b .row:first-child{border-top:0}
  .payline{display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--line)} .payline:first-child{border-top:0}
  .payline .pn{flex:1; min-width:0} .payline .pn .t{font-weight:600; font-size:14px} .payline .pn .d{font-size:12px; margin-top:2px; color:var(--muted)}
  .miniqr{flex:none; font:inherit; font-size:12.5px; font-weight:700; color:var(--primary); background:var(--primary-soft); border:0; border-radius:9px; padding:8px 12px; cursor:pointer} .miniqr:active{opacity:.8}
  .backbtn{width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--ink); margin-right:4px; flex:none; padding:0}
  .det-actions{display:flex; gap:8px; margin-left:auto}
  .det-actions button{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--primary)} .det-actions button:active{background:#F1F3F8}
  .acc{border:1px solid var(--line); border-radius:14px; margin-top:12px; background:var(--surface); overflow:hidden}
  .acc-h{display:flex; align-items:center; gap:8px; padding:13px 14px; cursor:pointer; user-select:none}
  .acc-h .t{font-weight:700; font-size:14.5px; display:flex; align-items:center; gap:8px} .acc-h .t .cnt{font-size:12px; font-weight:600; color:var(--muted)}
  .acc-h .chev{margin-left:auto; color:var(--faint); transition:transform .2s} .acc.open .chev{transform:rotate(180deg)}
  .acc-b{padding:0 14px 14px; display:none} .acc.open .acc-b{display:block}
  .cardfoot{display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:11px; border-top:1px solid var(--line)}
  .stat{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); font-weight:600} .stat b{color:var(--ink)} .stat svg{color:var(--faint)}
  .fee{font-family:'Spline Sans Mono',monospace; font-weight:600; font-size:13.5px} .fee span{color:var(--faint); font-weight:500; font-family:'Be Vietnam Pro'}

  .state{text-align:center; padding:60px 30px; color:var(--muted)} .state .big{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px}
  .spin{width:26px; height:26px; border:3px solid var(--line); border-top-color:var(--primary); border-radius:50%; animation:sp .7s linear infinite; margin:0 auto 14px} @keyframes sp{to{transform:rotate(360deg)}}
  .spinner-sm{width:16px; height:16px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite}

  .fab{position:fixed; left:50%; transform:translateX(-50%); bottom:76px; z-index:40; width:min(412px,calc(100% - 28px)); background:var(--primary); color:#fff; border:0; border-radius:15px; padding:14px; font:inherit; font-size:15.5px; font-weight:700; cursor:pointer; box-shadow:0 8px 24px rgba(39,71,217,.4); display:flex; align-items:center; justify-content:center; gap:8px}
  .fab:active{background:var(--primary-press); transform:translateX(-50%) scale(.99)}

  .bottomnav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:440px; background:var(--surface); border-top:1px solid var(--line); display:flex; height:62px; z-index:45}
  .navitem{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--faint); font-size:11px; font-weight:600; cursor:pointer; border:0; background:transparent}
  .navitem.active{color:var(--primary)}

  .scrim{position:fixed; inset:0; background:rgba(16,32,55,.45); opacity:0; pointer-events:none; transition:.25s; z-index:50} .scrim.show{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); width:100%; max-width:440px; max-height:92vh; overflow-y:auto; background:var(--surface); border-radius:22px 22px 0 0; z-index:60; transition:transform .3s cubic-bezier(.32,.72,0,1); box-shadow:var(--sheet-shadow)} .sheet.show{transform:translateX(-50%) translateY(0)}
  .act{position:fixed; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); width:100%; max-width:440px; max-height:85vh; overflow-y:auto; background:var(--surface); border-radius:22px 22px 0 0; z-index:70; transition:transform .28s cubic-bezier(.32,.72,0,1); box-shadow:var(--sheet-shadow); padding:8px 18px 26px} .act.show{transform:translateX(-50%) translateY(0)}
  .grip{width:38px; height:4px; background:#D7DCE5; border-radius:99px; margin:10px auto 2px}
  .sheet-pad{padding:6px 20px 28px}
  .sheet h2,.act h3{font-weight:800; letter-spacing:-.02em} .sheet h2{font-size:21px; margin:4px 0 2px} .act h3{font-size:17px; margin:6px 2px 2px}
  .sheet .lead,.act .who2{color:var(--muted); font-size:13.5px; margin:0 0 6px}

  .det-head{display:flex; gap:13px; align-items:center; padding:8px 0 16px}
  .det-head .avatar{width:54px; height:54px; font-size:20px; border-radius:15px}
  .det-head .nm{font-size:20px; font-weight:800; letter-spacing:-.02em} .det-head .pill{margin-top:6px}
  .dh{padding:8px 2px 6px} .dh .nm{font-size:21px; font-weight:800; letter-spacing:-.02em} .dh .meta{color:var(--muted); font-size:13.5px; font-weight:500; margin-top:5px; display:flex; gap:8px; align-items:center; flex-wrap:wrap} .dh .lvl{font-size:12px; font-weight:700; color:#3a4660; background:var(--primary-soft); padding:3px 10px; border-radius:7px}
  .row{display:flex; justify-content:space-between; gap:14px; padding:12px 0; border-top:1px solid var(--line); font-size:14.5px} .row .k{color:var(--muted); font-weight:500; flex:none} .row .v{text-align:right; font-weight:600}
  .seclabel{display:flex; align-items:center; justify-content:space-between; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); margin:20px 0 4px} .seclabel .badge{font-size:12px; color:var(--muted); text-transform:none; letter-spacing:0; font-weight:600}
  .roster{display:flex; flex-direction:column; gap:8px; margin-top:8px}
  .rost{display:flex; align-items:center; gap:11px; padding:9px 11px; border:1px solid var(--line); border-radius:12px; cursor:pointer} .rost:active{background:#FAFBFD}
  .rost .av{width:34px; height:34px; flex:none; border-radius:10px; display:grid; place-items:center; color:#fff; font-weight:700; font-size:13px} .rost .rn{flex:1; font-weight:600; font-size:14px} .rost .pill{font-size:10.5px; padding:3px 8px}

  .seg{display:flex; gap:7px} .seg button{flex:1; font:inherit; font-size:14px; font-weight:600; padding:11px; cursor:pointer; background:var(--surface); border:1px solid var(--line); border-radius:11px; color:var(--muted)} .seg button.on{background:var(--primary-soft); border-color:var(--primary); color:var(--primary)}
  .seg.wrap{flex-wrap:wrap} .seg.wrap button{flex:1 1 28%; font-size:13px; padding:10px 6px}
  .daypick{display:flex; gap:5px} .daypick button{flex:1; font:inherit; font-size:13px; font-weight:600; padding:11px 0; cursor:pointer; background:var(--surface); border:1px solid var(--line); border-radius:10px; color:var(--muted)} .daypick button.on{background:var(--primary-soft); border-color:var(--primary); color:var(--primary)}
  .feewrap{position:relative} .feewrap input{padding-right:42px} .feewrap .unit{position:absolute; right:13px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:14px; font-weight:600}
  .addlink{font-size:13px; font-weight:600; color:var(--primary); cursor:pointer; margin-top:8px; display:inline-block}
  .callout{margin-top:16px; background:#F4F8FF; border:1px solid #D7E2FB; border-radius:13px; padding:13px 14px; display:flex; gap:11px} .callout svg{flex:none; color:var(--primary); margin-top:1px} .callout .ct{font-size:13px; line-height:1.5; color:#2a3a63} .callout .ct b{color:var(--primary)} .callout .code{font-family:'Spline Sans Mono',monospace; font-weight:600; background:#fff; border:1px solid #cdd9f5; padding:1px 6px; border-radius:6px}

  .opt{width:100%; display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--line); border-radius:13px; background:var(--surface); font:inherit; font-size:15px; font-weight:600; cursor:pointer; margin-top:9px; color:var(--ink)} .opt:active{background:#FAFBFD}
  .opt .ic{width:28px; height:28px; border-radius:8px; display:grid; place-items:center; flex:none; font-size:13px; font-weight:800}

  .save{width:100%; margin-top:20px; background:var(--primary); color:#fff; border:0; border-radius:13px; padding:15px; font:inherit; font-size:15.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px} .save:active{background:var(--primary-press)} .save:disabled{opacity:.6}
  .ghost{width:100%; margin-top:9px; background:transparent; color:var(--muted); border:0; padding:10px; font:inherit; font-size:14px; font-weight:600; cursor:pointer}

  .dash{padding:14px 16px 150px}
  .hero{background:var(--ink); color:#fff; border-radius:18px; padding:18px; box-shadow:0 10px 28px rgba(16,32,55,.22)}
  .hero .lbl{font-size:12px; font-weight:600; color:#A9B4C6}
  .hero .big{font-family:'Spline Sans Mono',monospace; font-size:30px; font-weight:700; margin-top:4px; letter-spacing:-.01em}
  .hero .big span{font-size:16px; color:#9aa7bd}
  .hero .note{font-size:12px; color:#8f9bb0; margin-top:8px; line-height:1.4}
  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px}
  .tile{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px 15px; box-shadow:var(--shadow)}
  .tile .n{font-size:26px; font-weight:800; letter-spacing:-.02em; line-height:1}
  .tile .l{font-size:12.5px; color:var(--muted); font-weight:600; margin-top:6px}
  .tile.warn .n{color:var(--danger)}
  .tile[data-go],.hero[data-go]{cursor:pointer; transition:transform .12s} .tile[data-go]:active,.hero[data-go]:active{transform:scale(.985)} .tile-off{opacity:.5}
  .dsec{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); margin:22px 4px 10px}
  .warnrow{display:flex; align-items:center; gap:11px; padding:11px 13px; background:var(--surface); border:1px solid var(--line); border-radius:13px; box-shadow:var(--shadow); cursor:pointer; margin-bottom:8px}
  .infonote{margin-top:18px; background:var(--primary-soft); border:1px solid #D7E2FB; border-radius:13px; padding:13px 14px; font-size:12.5px; line-height:1.55; color:#2a3a63} .infonote b{color:var(--primary)}
  .monthnav{display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:6px; box-shadow:var(--shadow); margin-bottom:12px}
  .monthnav button{width:38px; height:38px; border:0; background:transparent; border-radius:9px; cursor:pointer; color:var(--muted); font-size:20px}
  .monthnav .mlabel{font-weight:700; font-size:15px}
  .tcsum{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px}
  .tcsum .c{background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:11px 8px; text-align:center; box-shadow:var(--shadow)}
  .tcsum .c .n{font-family:'Spline Sans Mono',monospace; font-weight:700; font-size:14px} .tcsum .c .l{font-size:10.5px; color:var(--muted); font-weight:600; margin-top:3px}
  .tcsum .c.thu .n{color:var(--ok)} .tcsum .c.chi .n{color:var(--danger)}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://zpaicfpuogmewsulawxx.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwYWljZnB1b2dtZXdzdWxhd3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTE4MTIsImV4cCI6MjA5ODM4NzgxMn0.crkUGJuB2eB7NyprRzg2IQaJ_LfrAwi6H7Oct4UQ5i8';

const CST={dang_tuyen:'Đang tuyển', dang_hoc:'Đang học', da_dong:'Đã đóng'};
const QH={bo:'Bố', me:'Mẹ', khac:'Khác'};
const $=s=>document.querySelector(s);
const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const initials=n=>{const p=(n||'?').trim().split(/\s+/); return ((p[0][0]||'')+(p[p.length-1][0]||'')).toUpperCase();};
const ini1=n=>{const p=(n||'?').trim().split(/\s+/); return (p[p.length-1][0]||'?').toUpperCase();};
const avaC=k=>AVA[(parseInt((k||'').replace(/\D/g,''))||(k||'').length)%AVA.length];

const fmtDate=d=>d? d.split('-').reverse().join('/') : '—';

let db, me={name:'',role:'nhan_vien'}, view='hoc_sinh';
let students=[], classes=[], teachers=[], makeups=[], curStudent=null;
let thuchi=[], tcY=null, tcM=null, tcEditId=null, tcLoai='chi';
let payments=[], unmatched=[], hpTab='due', hpCtx=null, hpMonths=1, hpMethod='Tiền mặt', hpStart='';
const BANK={bin:'970432', stk:'150464056', ten:'NGUYEN BA TRUNG', nganHang:'VPBank'}; // TẠM để test SePay; sau đổi lại TPBank: {bin:'970423', stk:'82868886666', ten:'HO KINH DOANH IMPETUS', nganHang:'TPBank'}
const addDays=(d,n)=>{const x=new Date(d); x.setDate(x.getDate()+n); return x;};
const addMonths=(d,n)=>{const x=new Date(d); x.setMonth(x.getMonth()+n); return x;};
const toISO=d=>d.toISOString().slice(0,10);
const CAT={chi:['Thuê nhà','Điện nước','Lương','Mua sắm/Thiết bị','Marketing','Khác'], thu:['Học phí','Bán sách','Khác']};
let sqQuery='', sqFilter='all', lopQuery='', formStatus='dang_hoc', editingId=null, cformDays=[], cformStatus='dang_tuyen', cEditingId=null;

const canWrite=()=>['nhan_vien','quan_ly'].includes(me.role);
const isManager=()=>me.role==='quan_ly';
const canSeeParent=()=>['nhan_vien','quan_ly'].includes(me.role);

if(!window.supabase){ showLgErr('Không tải được thư viện. Kiểm tra mạng rồi mở lại.'); }
else { db=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON); init(); }
function showLgErr(m){ $('#lg_err').textContent=m; $('#lg_err').classList.add('show'); }

async function init(){ const {data:{session}}=await db.auth.getSession(); if(session) enterApp(); }

/* ===== Auth ===== */
$('#lg_btn').onclick=login;
$('#lg_pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){
  const email=$('#lg_email').value.trim(), pass=$('#lg_pass').value;
  $('#lg_err').classList.remove('show');
  if(!email||!pass){ showLgErr('Nhập email và mật khẩu.'); return; }
  const b=$('#lg_btn'); b.disabled=true; b.innerHTML='<span class="spinner-sm"></span>Đang đăng nhập…';
  const {error}=await db.auth.signInWithPassword({email,password:pass});
  b.disabled=false; b.textContent='Đăng nhập';
  if(error){ showLgErr(error.message.includes('Invalid')?'Sai email hoặc mật khẩu.':error.message); return; }
  enterApp();
}
async function enterApp(){
  $('#login').classList.add('hide'); $('#main').classList.remove('hide');
  const {data:{user}}=await db.auth.getUser();
  const {data:prof}=await db.from('profiles').select('ho_ten, vai_tro').eq('id',user.id).maybeSingle();
  me.name=(prof&&prof.ho_ten)||user.email;
  me.role=(prof&&prof.vai_tro)||'nhan_vien';
  $('#me_name').textContent=me.name;
  $('#me_role').textContent={quan_ly:'Quản lý', nhan_vien:'Nhân viên', giao_vien:'Giáo viên'}[me.role]||me.role;
  if(isManager()){ $('#navDash').classList.remove('hide'); $('#navTc').classList.remove('hide'); }
  await loadAll();
  switchView(isManager()?'dashboard':'hoc_sinh');
}
$('#logout').onclick=async()=>{ await db.auth.signOut(); location.reload(); };

/* ===== Load ===== */
async function loadAll(){ await Promise.all([loadStudents(), loadClasses(), loadTeachers(), loadMakeups(), loadThuChi(), loadPayments(), loadUnmatched()]); }
async function loadStudents(){ const {data}=await db.from('hoc_sinh').select('*, phu_huynh(*), dang_ky_lop(id, trang_thai, lop_hoc(id, ten_lop, hoc_phi_thang))').order('ngay_tao',{ascending:false}); students=data||[]; }
async function loadPayments(){ const {data}=await db.from('thanh_toan').select('*, hoc_sinh(ho_ten, ma_hoc_sinh)').order('ngay_tao',{ascending:false}); payments=data||[]; }
async function loadUnmatched(){ const {data}=await db.from('giao_dich_chua_khop').select('*').eq('trang_thai','cho_xu_ly').order('ngay_tao',{ascending:false}); unmatched=data||[]; }
async function loadClasses(){ const {data}=await db.from('lop_hoc').select('*, giao_vien(ho_ten), dang_ky_lop(id, trang_thai, hoc_sinh(trang_thai))').order('ngay_tao',{ascending:false}); classes=data||[]; }
async function loadTeachers(){ const {data}=await db.from('giao_vien').select('id, ho_ten').order('ho_ten'); teachers=data||[]; }
async function loadMakeups(){ const {data}=await db.from('phieu_hoc_bu').select('*, hoc_sinh(id, ma_hoc_sinh, ho_ten), lop_hoc(ten_lop)').order('ngay_tao',{ascending:false}); makeups=data||[]; }
async function loadThuChi(){ const {data}=await db.from('thu_chi').select('*').order('ngay',{ascending:false}); thuchi=data||[]; }

/* ===== Nav ===== */
document.querySelectorAll('.navitem').forEach(n=>n.onclick=()=>switchView(n.dataset.v));
function switchView(v){
  view=v;
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.v===v));
  if(v==='dashboard') buildDashboard(); else if(v==='hoc_sinh') buildHocSinh(); else if(v==='lop') buildLop(); else if(v==='hoc_phi') buildHocPhi(); else buildThuChi();
  updateFab();
}
function updateFab(){
  const fab=$('#fab');
  if(view==='hoc_sinh' && canWrite()){ fab.classList.remove('hide'); fab.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>Thêm học sinh'; fab.onclick=()=>openStudentForm(null); }
  else if(view==='lop' && isManager()){ fab.classList.remove('hide'); fab.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>Tạo lớp mới'; fab.onclick=()=>openClassForm(null); }
  else if(view==='thu_chi' && isManager()){ fab.classList.remove('hide'); fab.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>Ghi khoản'; fab.onclick=()=>openTcForm(null); }
  else fab.classList.add('hide');
}

/* ===== HỌC SINH ===== */
function buildHocSinh(){
  $('#screen').innerHTML=`
    <div class="controls" style="padding-top:14px">
      <div class="titlerow" style="margin:0 0 12px"><h1>Học sinh</h1><span class="count" id="count">${students.length}</span></div>
      <div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="q" type="text" placeholder="Tìm theo tên hoặc mã…" value="${sqQuery}"></div>
      <div class="filters" id="filters">
        ${['all','cho_test','hoc_thu','dang_hoc','bao_luu','da_nghi'].map(f=>`<button class="chip ${sqFilter===f?'active':''}" data-f="${f}">${({all:'Tất cả',cho_test:'Chờ test',hoc_thu:'Học thử',dang_hoc:'Đang học',bao_luu:'Bảo lưu',da_nghi:'Đã nghỉ'})[f]}</button>`).join('')}
        <button class="chip hb ${sqFilter==='can_hoc_bu'?'active':''}" data-f="can_hoc_bu">Cần học bù${oweCount()?`<span class="cnt">${oweCount()}</span>`:''}</button>
      </div>
    </div>
    <div class="list" id="list"></div>`;
  $('#q').addEventListener('input',e=>{sqQuery=e.target.value; renderStudents();});
  $('#filters').addEventListener('click',e=>{const b=e.target.closest('.chip'); if(!b)return; sqFilter=b.dataset.f; document.querySelectorAll('#filters .chip').forEach(c=>c.classList.toggle('active',c===b)); renderStudents();});
  renderStudents();
}
function renderStudents(){
  const L=$('#list');
  const rows=students.filter(s=>{ if(sqFilter==='can_hoc_bu'){ if(!studentOwes(s))return false; } else if(sqFilter!=='all'&&s.trang_thai!==sqFilter){return false;} if(sqQuery){const q=norm(sqQuery); if(!norm(s.ho_ten).includes(q)&&!norm(s.ma_hoc_sinh).includes(q))return false;} return true; });
  if(!students.length){ L.innerHTML='<div class="state"><div class="big">Chưa có học sinh nào</div>'+(canWrite()?'Bấm “Thêm học sinh” để tạo em đầu tiên.':'Chưa có dữ liệu.')+'</div>'; return; }
  if(!rows.length){ L.innerHTML='<div class="state"><div class="big">Không tìm thấy</div>Thử đổi bộ lọc hoặc từ khóa.</div>'; return; }
  L.innerHTML='';
  rows.forEach(s=>{
    const lops=(s.dang_ky_lop||[]).filter(d=>d.lop_hoc && d.trang_thai!=='da_nghi').map(d=>d.lop_hoc.ten_lop);
    const el=document.createElement('div'); el.className='scard';
    el.innerHTML=`<div class="avatar" style="background:${avaC(s.ma_hoc_sinh)}">${ini1(s.ho_ten)}</div>
      <div class="who"><div class="nm">${s.ho_ten}</div><div class="sub">
        <span class="idtag"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="9" r="3"/><path d="M6.5 19a5.5 5.5 0 0 1 11 0"/></svg>${s.ma_hoc_sinh}</span>
        ${lops.length? lops.map(l=>`<span class="lopchip">${l}</span>`).join('') : '<span class="phone" style="color:#9AA4B2">Chưa xếp lớp</span>'}
        ${owesN(s)?`<span class="phone" style="color:var(--danger);font-weight:600">Nợ ${owesN(s)} buổi</span>`:''}</div></div>
      <span class="pill ${s.trang_thai}">${ST[s.trang_thai]||s.trang_thai}</span>`;
    el.onclick=()=>openStudentDetail(s);
    L.appendChild(el);
  });
}
function accSection(key,title,body,open,badge){
  return `<div class="acc ${open?'open':''}" data-acc="${key}"><button class="acc-h">${title}${badge?`<span class="acc-badge">${badge}</span>`:''}<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m6 9 6 6 6-6"/></svg></button><div class="acc-b">${body}</div></div>`;
}
function bindAccordion(){ $('#sheetBody').querySelectorAll('.acc-h').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open')); }
function studentPayLines(s){
  const lines=[];
  (s.dang_ky_lop||[]).forEach(d=>{
    if(!d.lop_hoc || d.trang_thai==='da_nghi') return;
    let maxKy=null, pending=null;
    payments.forEach(p=>{ if(p.loai!=='hoc_phi'||p.dang_ky_lop_id!==d.id) return; if(p.trang_thai==='da_thu'&&p.ky_den){ if(!maxKy||p.ky_den>maxKy) maxKy=p.ky_den; } if(p.trang_thai==='cho_thanh_toan') pending=p; });
    lines.push({hsId:s.id, ma:s.ma_hoc_sinh, hoTen:s.ho_ten, enrollId:d.id, lopTen:d.lop_hoc.ten_lop, fee:Number(d.lop_hoc.hoc_phi_thang)||0, giam:Number(s.giam_gia_phan_tram)||0, maxKyDen:maxKy, pending});
  });
  return lines;
}
function openStudentPhieuPicker(s){
  const lines=studentPayLines(s);
  if(!lines.length){ toast('Em chưa xếp lớp',false); return; }
  $('#actBody').innerHTML=`<h3>Tạo phiếu học phí</h3><p class="who2">${s.ho_ten} · chọn lớp.</p>
    ${lines.map(l=>`<button class="opt" data-enroll="${l.enrollId}" ${l.pending?`data-pending="${l.pending.id}"`:''}><span class="ic" style="background:${avaC(l.lopTen)};color:#fff;font-size:11px;font-weight:800">${l.lopTen.slice(0,3).toUpperCase()}</span><div style="text-align:left;flex:1"><div>${l.lopTen}</div><div style="font-size:12px;color:var(--muted);font-weight:500">${l.pending?'Có phiếu chờ — xem QR':(l.maxKyDen?'Đã đóng tới '+l.maxKyDen.split('-').reverse().join('/'):'Chưa đóng')}</div></div></button>`).join('')}`;
  $('#actBody').querySelectorAll('.opt').forEach(o=>o.onclick=()=>{ closeAct(); const l=lines.find(x=>x.enrollId===o.dataset.enroll); if(l) openPayLineActions(l); });
  $('#actSheet').classList.add('show'); $('#scrim').classList.add('show');
}
function openStudentDetail(s){
  curStudent=s;
  const ph=canSeeParent()? ((s.phu_huynh&&s.phu_huynh[0])||null) : null;
  const enr=(s.dang_ky_lop||[]).filter(d=>d.lop_hoc);
  const enrRows = enr.length
    ? enr.map(d=>`<div class="rost enrrow" data-id="${d.id}"><div style="flex:1"><div style="font-weight:600;font-size:14px">${d.lop_hoc.ten_lop}</div></div><span class="pill ${d.trang_thai}">${ST[d.trang_thai]||d.trang_thai}</span></div>`).join('')
    : '<div style="color:#9AA4B2;font-size:14px;padding:4px 0">Chưa xếp lớp nào.</div>';
  const classBody = `<div class="roster">${enrRows}</div>${canWrite()?'<button class="opt" id="addLop" style="margin-top:10px"><span class="ic" style="background:var(--primary-soft);color:var(--primary)">＋</span>Thêm / chuyển lớp</button>':''}`;
  const mk=makeups.filter(m=>m.hoc_sinh_id===s.id);

async function saveStudent(){
  const ten=$('#f_ten').value.trim(), ma=$('#f_ma').value.trim().toUpperCase();
  if(!ten) return toast('Chưa nhập họ tên',false);
  if(!ma) return toast('Chưa nhập mã học sinh',false);
  const btn=$('#saveS'); btn.disabled=true; const old=btn.innerHTML; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const payload={ma_hoc_sinh:ma, ho_ten:ten, ngay_sinh:$('#f_ns').value||null, gioi_tinh:$('#f_gt').value, truong_hoc:$('#f_truong').value.trim()||null, ngay_bat_dau:$('#f_batdau').value||null, trang_thai:formStatus, ghi_chu:$('#f_ghichu').value.trim()||null, ngay_hen_test:($('#f_hentest')&&$('#f_hentest').value)||null};
  if(isManager()&&$('#f_giam')) payload.giam_gia_phan_tram=+$('#f_giam').value||0;
  let hsId=editingId, err=null;
  if(editingId){ const r=await db.from('hoc_sinh').update(payload).eq('id',editingId); err=r.error; }
  else { const r=await db.from('hoc_sinh').insert(payload).select('id').single(); err=r.error; if(!err)hsId=r.data.id; }
  if(err){ btn.disabled=false; btn.innerHTML=old; return toast(err.code==='23505'?'Mã '+ma+' đã tồn tại':err.message,false); }
  const phTen=$('#f_phten').value.trim(), phSdt=$('#f_phsdt').value.trim(), phQh=$('#f_phqh').value;
  if(phTen||phSdt){
    const ex=editingId? (students.find(x=>x.id===editingId)?.phu_huynh?.[0]) : null;
    if(ex) await db.from('phu_huynh').update({ho_ten:phTen||null,quan_he:phQh,so_dien_thoai:phSdt||null}).eq('id',ex.id);
    else await db.from('phu_huynh').insert({hoc_sinh_id:hsId,ho_ten:phTen||null,quan_he:phQh,so_dien_thoai:phSdt||null});
  }
  const lopSel = (!editingId && $('#f_lop')) ? $('#f_lop').value : '';
  if(lopSel){ await db.from('dang_ky_lop').insert({hoc_sinh_id:hsId, lop_hoc_id:lopSel, trang_thai:'dang_hoc'}); await loadClasses(); }
  await loadStudents(); closeSheets(); if(view==='hoc_sinh')renderStudents(); toast(editingId?'Đã lưu thay đổi':'Đã thêm '+ten);
}

function buildThuChi(){ if(tcY===null){ const n=new Date(); tcY=n.getFullYear(); tcM=n.getMonth(); } renderThuChi(); }
function renderThuChi(){
  const inM=thuchi.filter(t=>{const d=new Date(t.ngay); return d.getFullYear()===tcY && d.getMonth()===tcM;});
  const thu=inM.filter(t=>t.loai==='thu').reduce((a,t)=>a+Number(t.so_tien),0);
  const chi=inM.filter(t=>t.loai==='chi').reduce((a,t)=>a+Number(t.so_tien),0);
  const rows = inM.length
    ? [...inM].sort((a,b)=> a.ngay<b.ngay?1:-1).map(t=>{const isThu=t.loai==='thu'; return `<div class="tcrow" data-id="${t.id}"><div class="cat"><div class="t">${t.danh_muc}</div><div class="d">${fmtDate(t.ngay)}${t.ghi_chu?' · '+t.ghi_chu:''}</div></div><div class="amt ${t.loai}">${isThu?'+':'−'}${vnd(t.so_tien)}đ</div></div>`;}).join('')
    : '<div class="state"><div class="big">Chưa có khoản nào tháng này</div>Bấm “Ghi khoản” để thêm thu hoặc chi.</div>';
  $('#screen').innerHTML=`
    <div class="dash">
      <div class="titlerow" style="margin:2px 0 14px"><h1>Thu chi</h1></div>
      <div class="monthnav"><button id="tcPrev">‹</button><div class="mlabel">Tháng ${String(tcM+1).padStart(2,'0')}/${tcY}</div><button id="tcNext">›</button></div>
      <div class="tcsum">
        <div class="c thu"><div class="n">${vnd(thu)}</div><div class="l">Thu</div></div>
        <div class="c chi"><div class="n">${vnd(chi)}</div><div class="l">Chi</div></div>
        <div class="c"><div class="n" style="${thu-chi<0?'color:var(--danger)':''}">${vnd(thu-chi)}</div><div class="l">Còn lại</div></div>
      </div>
      ${rows}
    </div>`;
  $('#tcPrev').onclick=()=>{ tcM--; if(tcM<0){tcM=11;tcY--;} renderThuChi(); };
  $('#tcNext').onclick=()=>{ tcM++; if(tcM>11){tcM=0;tcY++;} renderThuChi(); };
  $('#screen').querySelectorAll('.tcrow').forEach(r=>r.onclick=()=>openTcForm(thuchi.find(t=>t.id===r.dataset.id)));
}

function genCK(ma){ const mm=String(new Date().getMonth()+1).padStart(2,'0'); const r=Math.random().toString(36).slice(2,4).toUpperCase(); return (ma+'T'+mm+r).toUpperCase().replace(/[^A-Z0-9]/g,''); }
function qrUrl(sotien, nd){ return `https://img.vietqr.io/image/${BANK.bin}-${BANK.stk}-qr_only.png?amount=${sotien}&addInfo=${encodeURIComponent(nd)}&accountName=${encodeURIComponent(BANK.ten)}`; }
function dueList(){
  // các phiếu học phí đã thu / đang chờ, gom theo đăng ký lớp
  const paidMax={}, pending={};
  payments.forEach(p=>{
    if(p.loai!=='hoc_phi'||!p.dang_ky_lop_id) return;
    if(p.trang_thai==='da_thu' && p.ky_den){ if(!paidMax[p.dang_ky_lop_id]||p.ky_den>paidMax[p.dang_ky_lop_id]) paidMax[p.dang_ky_lop_id]=p.ky_den; }
    if(p.trang_thai==='cho_thanh_toan') pending[p.dang_ky_lop_id]=true;
  });
  const today=toISO(new Date()); const list=[];
  students.forEach(s=>{
    if(s.trang_thai!=='dang_hoc'&&s.trang_thai!=='bao_luu') return;
    (s.dang_ky_lop||[]).forEach(d=>{
      if(!d.lop_hoc||d.trang_thai==='da_nghi') return;
      if(pending[d.id]) return; // đã có phiếu chờ, không tính đến hạn
      const maxKy=paidMax[d.id]||null;
      let due=false, kind='new';
      if(!maxKy){ due=true; kind='new'; }
      else { const dl=Math.round((new Date(maxKy)-new Date(today))/86400000); if(dl<0){due=true;kind='over';} else if(dl<=7){due=true;kind='soon';} }
      if(due) list.push({hsId:s.id, ma:s.ma_hoc_sinh, hoTen:s.ho_ten, enrollId:d.id, lopTen:d.lop_hoc.ten_lop, fee:Number(d.lop_hoc.hoc_phi_thang)||0, giam:Number(s.giam_gia_phan_tram)||0, maxKyDen:maxKy, kind});
    });
  });
  return list;
}

      <div><div style="font-weight:700;font-size:15px">${e.hoTen}</div><div style="font-size:12.5px;color:var(--muted)">${e.lopTen} · ${vnd(e.fee)}đ/tháng${e.giam?` · giảm ${e.giam}%`:''}</div></div>
    </div>
    <div style="margin-top:16px;font-size:13px;font-weight:600;color:#3a4660;margin-bottom:8px">Hình thức</div>
    <div class="seg" id="mpmethod"><button class="on" data-v="Tiền mặt">Tiền mặt</button><button data-v="CK tay">CK tay</button></div>
    <div style="margin-top:14px;font-size:13px;font-weight:600;color:#3a4660;margin-bottom:8px">Số tháng đóng</div>
    <div class="seg" id="mpseg"><button class="on" data-m="1">1 tháng</button><button data-m="2">2 tháng</button><button data-m="3">3 tháng</button></div>
    <div class="field" style="margin-top:14px"><label>Tính từ tháng</label><input id="mpstart" type="month" value="${hpStart}"><div class="hint">Đóng từ trước khi có app thì chọn đúng tháng bắt đầu.</div></div>
    <div id="mpcalc"></div>
    <button class="save" id="mpmk">Xác nhận đã đóng</button>
    <button class="ghost" id="mpcancel">Hủy</button>`;
  drawMarkCalc();
  $('#mpmethod').addEventListener('click',ev=>{const b=ev.target.closest('button'); if(!b)return; hpMethod=b.dataset.v; document.querySelectorAll('#mpmethod button').forEach(x=>x.classList.toggle('on',x===b));});
  $('#mpseg').addEventListener('click',ev=>{const b=ev.target.closest('button'); if(!b)return; hpMonths=+b.dataset.m; document.querySelectorAll('#mpseg button').forEach(x=>x.classList.toggle('on',x===b)); drawMarkCalc();});
  $('#mpstart').addEventListener('change',drawMarkCalc);
  $('#mpmk').onclick=doMarkPaid;
  $('#mpcancel').onclick=()=>{ if(curStudent)openStudentDetail(curStudent); else closeSheets(); };
  show('#sheet');
}
async function doMarkPaid(){
  const e=hpCtx, m=hpMonths;
  const tot=Math.round(e.fee*m*(1-e.giam/100));
  const {kyTu,kyDen}=markPeriod();
  const btn=$('#mpmk'); btn.disabled=true; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const {error}=await db.from('thanh_toan').insert({hoc_sinh_id:e.hsId, loai:'hoc_phi', dang_ky_lop_id:e.enrollId, so_thang:m, ky_tu:toISO(kyTu), ky_den:toISO(kyDen), so_tien:tot, noi_dung_ck:null, trang_thai:'da_thu', ngay_thanh_toan:new Date().toISOString(), ghi_chu:hpMethod});
  if(error){ btn.disabled=false; btn.textContent='Xác nhận đã đóng'; return toast(error.message,false); }
  await db.from('thu_chi').insert({loai:'thu', danh_muc:'Học phí', so_tien:tot, ngay:new Date().toISOString().slice(0,10), ghi_chu:e.hoTen+' · '+hpMethod});
  await Promise.all([loadPayments(), loadThuChi()]);
  if(view==='hoc_phi'){ closeSheets(); renderHocPhi(); }
  else if(curStudent){ openStudentDetail(curStudent); }
  else closeSheets();
  toast('Đã ghi thu '+vnd(tot)+'đ ('+hpMethod+')');
}
function showQR(p){
  $('#sheetBody').innerHTML=`
    <h2>Phiếu học phí</h2><p class="lead">Gửi QR này cho phụ huynh — quét là chuyển đúng số tiền.</p>
    <div class="qrcard">
      <div class="qrbox"><img src="${qrUrl(p.so_tien,p.noi_dung_ck)}" alt="QR" onerror="this.parentNode.innerHTML='<div style=&quot;padding:20px;font-size:13px;color:#9AA4B2&quot;>Không tải được ảnh QR (cần mạng). Nội dung CK: '+'${p.noi_dung_ck}'+'</div>'"></div>
      <div class="qramt">${vnd(p.so_tien)}đ</div>
      <div class="qrinfo">
        <div class="r"><span class="k">Học sinh</span><span class="v">${p.hoc_sinh?.ho_ten||''} · ${p.hoc_sinh?.ma_hoc_sinh||''}</span></div>
        <div class="r"><span class="k">Nội dung CK</span><span class="v mono">${p.noi_dung_ck}</span></div>
        <div class="r"><span class="k">Ngân hàng</span><span class="v">${BANK.nganHang}</span></div>
        <div class="r"><span class="k">Số tài khoản</span><span class="v mono">${BANK.stk}</span></div>
      </div>
    </div>
    <div class="waitbar">Chờ phụ huynh chuyển — sẽ tự xác nhận khi bật SePay. Giờ tạm xác nhận tay.</div>
    <button class="save" id="hpConfirm" style="margin-top:12px">Xác nhận đã nhận tiền</button>
    <button class="ghost del" id="hpCancel">Hủy phiếu này</button>
    <button class="ghost" onclick="closeSheets()">Đóng</button>`;
  $('#hpConfirm').onclick=()=>confirmPaid(p);
  $('#hpCancel').onclick=()=>cancelPhieu(p);
  show('#sheet');
}
async function confirmPaid(p){
  const {data,error}=await db.from('thanh_toan').update({trang_thai:'da_thu', ngay_thanh_toan:new Date().toISOString()}).eq('id',p.id).eq('trang_thai','cho_thanh_toan').select('id');
  if(error)return toast(error.message,false);
  if(data && data.length){ await db.from('thu_chi').insert({loai:'thu', danh_muc:'Học phí', so_tien:p.so_tien, ngay:new Date().toISOString().slice(0,10), ghi_chu:((p.hoc_sinh&&p.hoc_sinh.ho_ten)||'')+' · CK'}); }
  await Promise.all([loadPayments(), loadThuChi()]);
  if(view==='hoc_phi'){ closeSheets(); renderHocPhi(); }
  else if(curStudent){ openStudentDetail(curStudent); }
  else closeSheets();
  toast('Đã ghi nhận thu '+vnd(p.so_tien)+'đ');
}
async function cancelPhieu(p){
  const {error}=await db.from('thanh_toan').update({trang_thai:'huy'}).eq('id',p.id);
  if(error)return toast(error.message,false);
  await loadPayments();
  if(view==='hoc_phi'){ closeSheets(); renderHocPhi(); }
  else if(curStudent){ openStudentDetail(curStudent); }
  else closeSheets();
  toast('Đã hủy phiếu');
}
function openAssign(u){
  const pend=payments.filter(p=>p.trang_thai==='cho_thanh_toan');
  $('#sheetBody').innerHTML=`
    <h2>Gán khoản tiền</h2><p class="lead">Tiền về <b style="color:var(--ok)">+${vnd(u.so_tien)}đ</b>, nội dung "${u.noi_dung_ck||''}" không tự khớp. Chọn phiếu để gán.</p>
    <div style="display:flex;flex-direction:column;gap:9px;margin-top:14px">
    ${pend.length? pend.map(p=>`<button class="opt" data-id="${p.id}"><div style="font-family:'Spline Sans Mono',monospace;font-weight:700;color:var(--primary);flex:none">${vnd(p.so_tien)}đ</div><div style="flex:1;text-align:left;margin-left:10px"><div>${p.hoc_sinh?.ho_ten||''}</div><div style="font-size:12px;color:var(--muted)">ND: ${p.noi_dung_ck}</div></div>${p.so_tien===u.so_tien?'<span class="pill dang_hoc" style="flex:none">Khớp tiền</span>':''}</button>`).join('') : '<div class="state" style="padding:24px"><div class="big">Chưa có phiếu chờ</div>Tạo phiếu trước rồi gán.</div>'}
    </div>
    <button class="ghost" onclick="closeSheets()">Đóng</button>`;
  $('#sheetBody').querySelectorAll('.opt').forEach(o=>o.onclick=async()=>{
    const p=pend.find(x=>x.id===o.dataset.id);
    await db.from('thanh_toan').update({trang_thai:'da_thu', ngay_thanh_toan:new Date().toISOString(), sepay_transaction_id:u.sepay_transaction_id}).eq('id',p.id);
    await db.from('giao_dich_chua_khop').update({trang_thai:'da_gan', thanh_toan_gan_id:p.id}).eq('id',u.id);
    closeSheets(); await Promise.all([loadPayments(), loadUnmatched()]); if(view==='hoc_phi')renderHocPhi(); toast('Đã gán '+vnd(u.so_tien)+'đ');
  });
  show('#sheet');
}

/* ===== plumbing ===== */
function show(sel){ $('#scrim').classList.add('show'); $(sel).classList.add('show'); }
function closeSheets(){ $('#scrim').classList.remove('show'); $('#sheet').classList.remove('show'); $('#actSheet').classList.remove('show'); }
function closeAct(){ $('#actSheet').classList.remove('show'); }
$('#actGrip').onclick=closeAct; $('#actClose').onclick=closeAct;
$('#scrim').onclick=()=>{ if($('#actSheet').classList.contains('show')){ closeAct(); if(!$('#sheet').classList.contains('show'))$('#scrim').classList.remove('show'); } else closeSheets(); };
let toastT; function toast(m,ok=true){ $('#toastMsg').textContent=m; $('#toast').className='toast show'+(ok?'':' err'); clearTimeout(toastT); toastT=setTimeout(()=>$('#toast').classList.remove('show'),2400); }
</script>
</body>
</html>
