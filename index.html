<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Impetus</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@latest/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@latest/500.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@latest/600.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@latest/700.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@latest/800.css">
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
<style>
  :root{
  color-scheme: light;
  /* ===== GIỮ NGUYÊN — không đổi giá trị ===== */
  --bg:#F6F6F6; --surface:#FFFFFF; --ink:#191c1f; --muted:#505a63; --faint:#8d969e; --line:#E6E6EA;
  --primary:#494fdf; --primary-press:#3a40c4; --primary-soft:#EAEAFB;
  --ok:#0E9F6E; --ok-soft:#E3F4EC; --warn:#C77700; --warn-soft:#FBF0DC;
  --danger:#D92D20; --danger-soft:#FDECEA;

  /* ===== THÊM MỚI — token chuẩn còn thiếu ===== */
  --soft:#ECECEE;
  --r-group:20px; --r-card:16px; --r-input:14px; --r-chip:8px; --r-pill:999px;
  --text-page:28px; --text-section:12px; --text-name:16.5px; --text-body:15px; --text-meta:13px; --text-sub:12.5px; --text-fine:12px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px;
  --safe-b:env(safe-area-inset-bottom, 0px);
  --st-dang-hoc:#0E9F6E; --st-cho-test:#7C3AED; --st-hoc-thu:#0E7490; --st-bao-luu:#C77700; --st-da-nghi:#7A8696;

  /* ===== TẠM GIỮ — token dư, xoá sau khi mọi module refactor xong (mục 1 checklist)
     Đang dùng ở: --off/--off-soft → .pill.da_nghi/.pill.nghi, .stt.da_dong/.spill.da_dong (Lớp học)
                  --shadow → .card, .qrbox, .toast (Dashboard + Thu chi đã hết dùng — refactor 07/2026)
                  --sheet-shadow → .sheet, .act ===== */
  --off:#7A8696; --off-soft:#EDEFF3;
  --shadow:0 1px 3px rgba(20,22,28,.05);
  --sheet-shadow:0 -8px 40px rgba(20,22,28,.16);
}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; display:flex; justify-content:center}
  .app{width:100%; max-width:440px; min-height:100vh; background:var(--bg); position:relative}
  .hide{display:none !important}

  #login{padding:0 22px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; max-width:440px; margin:0 auto}
  .lg-brand{display:flex; align-items:center; gap:11px; margin-bottom:28px}
  .lg-brand .logo{width:44px; height:44px; border-radius:13px; background:linear-gradient(150deg,var(--primary),#6b81f5); display:grid; place-items:center; color:#fff; font-weight:800; font-size:21px; box-shadow:0 6px 16px rgba(39,71,217,.32)}
  .lg-brand .t .n{font-weight:800; font-size:22px; letter-spacing:-.02em} .lg-brand .t .n span{color:var(--primary)}
  .lg-brand .t .s{font-size:13px; color:var(--muted); margin-top:2px}
  #login h1{font-size:24px; font-weight:800; letter-spacing:-.03em; margin:0 0 4px}
  #login .sub{color:var(--muted); font-size:14px; margin:0 0 22px}

  .field{margin-top:14px}
  .field label{display:block; font-size:13px; font-weight:600; color:#3a4660; margin-bottom:6px}
  .field label .req{color:var(--primary)}
  .field input,.field select,.field textarea{width:100%; font:inherit; font-size:15px; color:var(--ink); background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 13px; outline:0; transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .field .hint{font-size:12px; color:var(--faint); margin-top:6px}
  .two{display:flex; gap:11px} .two>*{flex:1; min-width:0}

  .bigbtn{width:100%; margin-top:22px; background:var(--primary); color:#fff; border:0; border-radius:13px; padding:15px; font:inherit; font-size:15.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px}
  .bigbtn:active{background:var(--primary-press)} .bigbtn:disabled{opacity:.6}
  .lg-err{margin-top:14px; background:var(--danger-soft); color:#8a231a; border-radius:11px; padding:11px 13px; font-size:13px; font-weight:600; display:none} .lg-err.show{display:block}

  .topbar{position:sticky; top:0; z-index:30; background:rgba(238,241,246,.86); backdrop-filter:blur(12px); padding:14px 18px 8px; border-bottom:1px solid var(--line)}
  .brand{display:flex; align-items:center; gap:9px}
  .logo{width:30px; height:30px; border-radius:9px; background:linear-gradient(150deg,var(--primary),#6b81f5); display:grid; place-items:center; color:#fff; font-weight:800; font-size:15px; box-shadow:0 4px 10px rgba(39,71,217,.3)}
  .brand .name{font-weight:800; font-size:17px; letter-spacing:-.02em} .brand .name span{color:var(--primary)}
  .brand .me{margin-left:auto; display:flex; align-items:center; gap:8px}
  .brand .me .who{text-align:right; font-size:11.5px; line-height:1.25}
  .brand .me .who b{font-weight:700; font-size:12.5px} .brand .me .who .r{color:var(--muted); font-weight:600}
  .iconbtn{width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--muted)}
  .titlerow{display:flex; align-items:baseline; gap:9px; margin-top:14px}
  .titlerow h1{font-size:26px; font-weight:700; letter-spacing:-.03em; margin:0}
  .titlerow .count{font-size:13px; font-weight:600; color:var(--muted); background:var(--surface); border:1px solid var(--line); padding:2px 9px; border-radius:999px}
  .pagetitle{display:flex; align-items:center; justify-content:space-between}
  .pagetitle h1{font-size:var(--text-page); font-weight:700; letter-spacing:-.03em; margin:0}
  .pagetitle h1 .n{color:var(--faint); font-weight:600}
  .addbtn{width:40px; height:40px; border-radius:var(--r-pill); background:var(--primary); color:#fff; border:0; display:grid; place-items:center; cursor:pointer; flex:none}
  .addbtn i{font-size:20px}

  .controls{padding:12px 18px 6px}

  .list{padding:8px 14px 150px; display:flex; flex-direction:column; gap:10px}

  /* student card */
  .avatar{width:46px; height:46px; flex:none; border-radius:50%; display:grid; place-items:center; font-weight:700; font-size:17px; color:#fff}
  .avatar.lg{width:88px; height:88px; font-size:34px}
  .avatar.sm{width:34px; height:34px; font-size:13px}
  .who{flex:1; min-width:0} .who .nm{font-weight:700; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .who .sub{display:flex; align-items:center; gap:7px; margin-top:5px; flex-wrap:wrap}
  .idtag{display:inline-flex; align-items:center; gap:5px; font-family:'Inter',sans-serif; font-weight:600; font-size:12px; color:#27324a; background:#F1F3F8; border:1px solid #E0E4EC; padding:2px 7px 2px 6px; border-radius:7px} .idtag svg{color:var(--primary)}
  .lopchip{font-size:11.5px; font-weight:600; color:#3a4660; background:var(--primary-soft); padding:2px 8px; border-radius:6px}
  .pill{flex:none; font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:999px}
  .pill.dang_hoc,.pill.hoc{color:var(--ok); background:var(--ok-soft)} .pill.bao_luu,.pill.luu{color:var(--warn); background:var(--warn-soft)} .pill.da_nghi,.pill.nghi{color:var(--off); background:var(--off-soft)}
  .pill.cho_test{color:#7C3AED; background:#F1EBFC} .pill.hoc_thu{color:#0E7490; background:#E1F1F6}

  /* week strip (dùng trong trang chi tiết lớp) */
  .week{display:flex; gap:4px; margin-top:13px} .day{flex:1; text-align:center; font-size:11px; font-weight:600; padding:5px 0; border-radius:7px; background:#F1F3F8; color:#A7B0BE} .day.on{background:var(--primary-soft); color:var(--primary)}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow); margin-bottom:10px}
  .det-actions{display:flex; gap:8px; flex:none}
  .icobtn{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--primary)} .icobtn:active{background:var(--primary-soft)}
  .acc{border:1px solid var(--line); border-radius:14px; margin-top:10px; overflow:hidden; background:var(--surface)}
  .acc-h{width:100%; display:flex; align-items:center; gap:8px; padding:13px 14px; border:0; background:transparent; font:inherit; font-size:14.5px; font-weight:700; color:var(--ink); cursor:pointer; text-align:left}
  .acc-h .chev{margin-left:auto; color:var(--faint); transition:transform .2s} .acc.open .acc-h .chev{transform:rotate(180deg)}
  .acc-badge{font-size:11.5px; font-weight:700; color:var(--danger); background:var(--danger-soft); padding:2px 8px; border-radius:999px}
  .acc-b{display:none; padding:0 14px 14px} .acc.open .acc-b{display:block} .acc-b .row:first-child{border-top:0}
  .payline{display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--line)} .payline:first-child{border-top:0}
  .payline .pn{flex:1; min-width:0} .payline .pn .t{font-weight:600; font-size:14px} .payline .pn .d{font-size:12px; margin-top:2px; color:var(--muted)}
  .miniqr{flex:none; font:inherit; font-size:12.5px; font-weight:700; color:var(--primary); background:var(--primary-soft); border:0; border-radius:9px; padding:8px 12px; cursor:pointer} .miniqr:active{opacity:.8}
  .payright{display:flex; align-items:center; gap:8px; flex:none}
  .paidtag{display:inline-flex; align-items:center; gap:4px; font-size:12.5px; font-weight:700; color:#0E9463; background:var(--ok-soft); padding:5px 11px; border-radius:999px}
  .miniico{width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface); color:var(--faint); font-size:17px; line-height:1; display:grid; place-items:center; cursor:pointer; flex:none} .miniico:active{background:#F4F5F9}
  .qracts{display:flex; gap:8px; margin-top:16px}
  .qact{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 4px; border-radius:14px; border:1px solid var(--line); background:var(--surface); cursor:pointer; font:inherit; font-size:12px; font-weight:600; color:var(--ink)} .qact svg{color:var(--muted)} .qact:active{transform:scale(.97)}
  .qact.primary{background:var(--primary); border:0; color:#fff} .qact.primary svg{color:#fff}
  .backbtn{width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--ink); margin-right:4px; flex:none; padding:0}
  .det-actions{display:flex; gap:8px; margin-left:auto}
  .det-actions button{width:38px; height:38px; border-radius:11px; border:1px solid var(--line); background:var(--surface); display:grid; place-items:center; cursor:pointer; color:var(--primary)} .det-actions button:active{background:#F1F3F8}
  .acc{border:1px solid var(--line); border-radius:14px; margin-top:12px; background:var(--surface); overflow:hidden}
  .acc-h{display:flex; align-items:center; gap:8px; padding:13px 14px; cursor:pointer; user-select:none}
  .acc-h .t{font-weight:700; font-size:14.5px; display:flex; align-items:center; gap:8px} .acc-h .t .cnt{font-size:12px; font-weight:600; color:var(--muted)}
  .acc-h .chev{margin-left:auto; color:var(--faint); transition:transform .2s} .acc.open .chev{transform:rotate(180deg)}
  .acc-b{padding:0 14px 14px; display:none} .acc.open .acc-b{display:block}
  .lopcard{background:var(--surface); border-radius:var(--r-group); padding:14px 16px; cursor:pointer} .lopcard:active{background:#FAFAFB}
  .lopcard .t{font-size:var(--text-name); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .lopcard .meta{font-size:var(--text-sub); font-weight:500; color:var(--faint); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .state{text-align:center; padding:60px 30px; color:var(--muted)} .state .big{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px}
  /* Skeleton loading (mục 21) */
  @keyframes shimmer{0%{background-position:-120px 0}100%{background-position:120px 0}}
  .skel{background:#ECECEE linear-gradient(90deg,#ECECEE 0%,#F6F6F6 50%,#ECECEE 100%) no-repeat; background-size:120px 100%; animation:shimmer 1.1s ease-in-out infinite; border-radius:8px}
  .skel.avatar{width:44px; height:44px; border-radius:50%; flex:none}
  .skel.line{height:13px; margin-top:6px} .skel.line.w60{width:60%} .skel.line.w40{width:40%} .skel.line.w30{width:30%}
  .spinner-sm{width:16px; height:16px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite}

  .fab{position:fixed; left:50%; transform:translateX(-50%); bottom:76px; z-index:40; width:min(412px,calc(100% - 28px)); background:var(--primary); color:#fff; border:0; border-radius:15px; padding:14px; font:inherit; font-size:15.5px; font-weight:700; cursor:pointer; box-shadow:0 8px 24px rgba(39,71,217,.4); display:flex; align-items:center; justify-content:center; gap:8px}
  .fab:active{background:var(--primary-press); transform:translateX(-50%) scale(.99)}

  .bottomnav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:440px; background:var(--surface); border-top:1px solid var(--line); display:flex; height:62px; z-index:45}
  .navitem{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--faint); font-size:11px; font-weight:600; cursor:pointer; border:0; background:transparent} .navitem i{font-size:23px; line-height:1} .icobtn i{font-size:19px; line-height:1} .backbtn i{font-size:20px; line-height:1} .fab i{font-size:20px; line-height:1}
  .navitem.active{color:var(--primary)}

  .scrim{position:fixed; inset:0; background:rgba(16,32,55,.45); opacity:0; pointer-events:none; transition:.25s; z-index:50} .scrim.show{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); width:100%; max-width:440px; max-height:92vh; overflow-y:auto; background:var(--bg); border-radius:22px 22px 0 0; z-index:60; transition:transform .3s cubic-bezier(.32,.72,0,1); box-shadow:var(--sheet-shadow)} .sheet.show{transform:translateX(-50%) translateY(0)}
  .sheetcard{background:var(--surface); border-radius:var(--r-group); padding:4px 16px 12px; margin-top:14px}
  .summ{background:var(--surface); border-radius:var(--r-card); padding:12px 14px; margin-top:14px; display:flex; align-items:center; gap:12px}
  .summ .av{width:40px; height:40px; border-radius:50%; flex:none; display:grid; place-items:center; color:#fff; font-weight:700; font-size:15px} .summ .nm{font-weight:700; font-size:15px} .summ .cd{font-size:12.5px; color:var(--muted); margin-top:1px}
  .act{position:fixed; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); width:100%; max-width:440px; max-height:85vh; overflow-y:auto; background:var(--bg); border-radius:22px 22px 0 0; z-index:70; transition:transform .28s cubic-bezier(.32,.72,0,1); box-shadow:var(--sheet-shadow); padding:8px 16px calc(20px + var(--safe-b))} .act.show{transform:translateX(-50%) translateY(0)}
  .achead{display:flex; align-items:flex-start; justify-content:space-between; padding:6px 2px 0}
  .achead .atitle{font-size:18px; font-weight:700; letter-spacing:-.01em}
  .achead .asub{font-size:13px; color:var(--muted); margin-top:3px}
  .aclose{width:30px; height:30px; border-radius:50%; background:var(--soft); color:var(--muted); display:grid; place-items:center; flex:none; border:0; cursor:pointer; margin-top:1px}
  .aclose i{font-size:15px}
  .actopt{background:var(--surface); border-radius:var(--r-card); padding:14px; display:flex; align-items:center; gap:12px; margin-top:10px; cursor:pointer; font:inherit; font-size:15px; font-weight:600; color:var(--ink); width:100%; text-align:left; border:0}
  .actopt:first-of-type{margin-top:16px}
  .actopt:active{background:#FAFAFB}
  .actopt i{font-size:19px; color:var(--ink); flex:none}
  .actopt .aoic{width:32px; height:32px; border-radius:9px; display:grid; place-items:center; color:#fff; font-size:11px; font-weight:800; flex:none}
  .actopt .aotxt{flex:1; min-width:0}
  .actopt .aotxt .t{font-size:15px; font-weight:600; color:var(--ink)}
  .actopt .aotxt .d{font-size:12.5px; color:var(--muted); font-weight:500; margin-top:2px}
  .actopt .statusdot{width:10px; height:10px; border-radius:50%; flex:none}
  .grip{width:38px; height:4px; background:#D7DCE5; border-radius:99px; margin:10px auto 2px}
  .sheet-pad{padding:6px 20px 28px}
  .sheet h2{font-weight:800; letter-spacing:-.02em; font-size:21px; margin:4px 0 2px}
  .sheet .lead{color:var(--muted); font-size:13.5px; margin:0 0 6px}

  /* Group + Row (mục 6 design-system) — component danh sách chuẩn */
  .group{background:var(--surface); border-radius:var(--r-group); overflow:hidden}
  .dash .group+.group{margin-top:10px}
  .row{display:flex; align-items:center; gap:12px; padding:14px 16px; position:relative; background:var(--surface)}
  .row + .row::before{content:""; position:absolute; top:0; left:16px; right:16px; height:1px; background:var(--line)}
  .row.tap{cursor:pointer} .row.tap:active{background:#F2F2F4}
  .row .lead{width:44px; flex:none}
  .row.haslead + .row.haslead::before{left:72px}
  .row .main{flex:1; min-width:0}
  .row .main .t{font-size:var(--text-name); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row .main .d,.row .main .meta{font-size:var(--text-sub); font-weight:500; color:var(--faint); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row .rchev{color:var(--faint); flex:none}
  .row .addico{width:36px; height:36px; border-radius:10px; background:var(--primary-soft); color:var(--primary); display:grid; place-items:center; font-size:19px; flex:none}
  .row.add .t{font-weight:600; font-size:15px}
  .row .k{font-size:var(--text-body); color:var(--muted)}
  .row .val{margin-left:auto; font-size:var(--text-body); font-weight:600; color:var(--ink); text-align:right}
  .meta .sep{margin:0 4px 0 3px; opacity:.5}
  .paid{color:var(--ok); font-weight:600}
  .unpaid{color:var(--danger); font-weight:600}
  .seg{display:flex; gap:7px} .seg button{flex:1; font:inherit; font-size:14px; font-weight:600; padding:11px; cursor:pointer; background:var(--surface); border:1px solid var(--line); border-radius:11px; color:var(--muted)} .seg button.on{background:var(--primary-soft); border-color:var(--primary); color:var(--primary)}
  .seg.wrap{flex-wrap:wrap} .seg.wrap button{flex:1 1 28%; font-size:13px; padding:10px 6px}
  .feewrap{position:relative} .feewrap input{padding-right:42px} .feewrap .unit{position:absolute; right:13px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:14px; font-weight:600}
  .addlink{font-size:13px; font-weight:600; color:var(--primary); cursor:pointer; margin-top:8px; display:inline-block}
  .callout{margin-top:16px; background:#F4F8FF; border:1px solid #D7E2FB; border-radius:13px; padding:13px 14px; display:flex; gap:11px} .callout svg{flex:none; color:var(--primary); margin-top:1px} .callout .ct{font-size:13px; line-height:1.5; color:#2a3a63} .callout .ct b{color:var(--primary)} .callout .code{font-family:'Inter',sans-serif; font-weight:600; background:#fff; border:1px solid #cdd9f5; padding:1px 6px; border-radius:6px}

  .opt{width:100%; display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--line); border-radius:13px; background:var(--surface); font:inherit; font-size:15px; font-weight:600; cursor:pointer; margin-top:9px; color:var(--ink)} .opt:active{background:#FAFBFD}
  .opt .ic{width:28px; height:28px; border-radius:8px; display:grid; place-items:center; flex:none; font-size:13px; font-weight:800}
  .chipset{display:flex; gap:7px; flex-wrap:wrap; margin-top:2px}
  .choice{font:inherit; font-size:14px; font-weight:600; padding:9px 14px; border-radius:var(--r-pill); background:var(--soft); color:var(--muted); border:0; cursor:pointer}
  .choice.on{background:var(--primary); color:#fff}
  .optrow{display:flex; align-items:center; gap:var(--sp-3); padding:13px 10px; border-radius:13px; cursor:pointer; font-size:var(--text-body); font-weight:600; color:var(--ink)}
  .optrow:active{background:#F2F2F4}

async function enterApp(){
  $('#login').classList.add('hide'); $('#main').classList.remove('hide');

/* ===== Load ===== */
async function loadAll(){ await Promise.all([loadStudents(), loadClasses(), loadTeachers(), loadMakeups(), loadThuChi(), loadPayments(), loadUnmatched(), loadDiemDanh()]); }
async function loadStudents(){ const {data}=await db.from('hoc_sinh').select('*, phu_huynh(*), dang_ky_lop(id, trang_thai, lop_hoc(id, ten_lop, hoc_phi_thang))').order('ngay_tao',{ascending:false}); students=data||[]; }
async function loadPayments(){ const {data}=await db.from('thanh_toan').select('*, hoc_sinh(ho_ten, ma_hoc_sinh), dang_ky_lop(lop_hoc(ten_lop))').order('ngay_tao',{ascending:false}); payments=data||[]; }
async function loadUnmatched(){ const {data}=await db.from('giao_dich_chua_khop').select('*').eq('trang_thai','cho_xu_ly').order('ngay_tao',{ascending:false}); unmatched=data||[]; }
async function loadClasses(){ const {data}=await db.from('lop_hoc').select('*, giao_vien(ho_ten), dang_ky_lop(id, trang_thai, hoc_sinh(trang_thai))').order('ngay_tao',{ascending:false}); classes=data||[]; }
async function loadTeachers(){ const {data}=await db.from('giao_vien').select('id, ho_ten').order('ho_ten'); teachers=data||[]; }
async function loadMakeups(){ const {data}=await db.from('phieu_hoc_bu').select('*, hoc_sinh(id, ma_hoc_sinh, ho_ten), lop_hoc(ten_lop)').order('ngay_tao',{ascending:false}); makeups=data||[]; }
async function loadThuChi(){ const {data}=await db.from('thu_chi').select('*').order('ngay',{ascending:false}); thuchi=data||[]; }
async function loadDiemDanh(){ const from=new Date(); from.setDate(from.getDate()-7); const fromISO=from.getFullYear()+'-'+String(from.getMonth()+1).padStart(2,'0')+'-'+String(from.getDate()).padStart(2,'0'); const {data}=await db.from('diem_danh').select('*').gte('ngay',fromISO).order('gio_quet',{ascending:false}); diemdanh=data||[]; }

document.querySelectorAll('.navitem').forEach(n=>n.onclick=()=>switchView(n.dataset.v));
function switchView(v){
  view=v;
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.v===v));
  if(v==='dashboard') buildDashboard(); else if(v==='hoc_sinh') buildHocSinh(); else if(v==='lop') buildLop(); else if(v==='hoc_phi') buildHocPhi(); else buildThuChi();
  updateFab();
}
function updateFab(){
  const fab=$('#fab');
  if(view==='thu_chi' && isManager()){ fab.classList.remove('hide'); fab.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14"/></svg>Ghi khoản'; fab.onclick=()=>openTcForm(null); }
  else fab.classList.add('hide');
}

/* ===== HỌC SINH ===== */
function buildHocSinh(){
  $('#screen').innerHTML=`
    <div class="controls" style="padding-top:14px">
      <div class="pagetitle" style="margin:0 0 12px"><h1>Học sinh <span class="n">${students.length}</span></h1>${canWrite()?'<button class="addbtn" id="addStudentBtn"><i class="hgi-stroke hgi-add-01"></i></button>':''}</div>
      <div class="searchbar"><i class="hgi-stroke hgi-search-01"></i><input id="q" type="text" placeholder="Tìm theo tên hoặc mã…" value="${sqQuery}"></div>
      <div class="pills" id="filters" style="margin-top:11px">
        ${['all','cho_test','hoc_thu','dang_hoc','bao_luu','da_nghi'].map(f=>`<button class="pillf ${sqFilter===f?'on':''}" data-f="${f}">${({all:'Tất cả',cho_test:'Chờ test',hoc_thu:'Học thử',dang_hoc:'Đang học',bao_luu:'Bảo lưu',da_nghi:'Đã nghỉ'})[f]}</button>`).join('')}
        <button class="pillf ${sqFilter==='can_hoc_bu'?'on':''}" data-f="can_hoc_bu">Cần học bù${oweCount()?`<span class="cnt">${oweCount()}</span>`:''}</button>
        ${isManager()?`<button class="pillf ${sqFilter==='da_dong'?'on':''}" data-f="da_dong">Đã đóng</button><button class="pillf ${sqFilter==='chua_dong'?'on':''}" data-f="chua_dong">Chưa đóng</button>`:''}
      </div>
    </div>
    <div class="list" id="list"></div>`;
  $('#q').addEventListener('input',e=>{sqQuery=e.target.value; renderStudents();});
  $('#filters').addEventListener('click',e=>{const b=e.target.closest('.pillf'); if(!b)return; sqFilter=b.dataset.f; document.querySelectorAll('#filters .pillf').forEach(c=>c.classList.toggle('on',c===b)); renderStudents();});
  if(canWrite()){ const ab=$('#addStudentBtn'); if(ab) ab.onclick=()=>openStudentForm(null); }
  renderStudents();
}
function renderStudents(){
  const L=$('#list');
  const rows=students.filter(s=>{ if(sqFilter==='can_hoc_bu'){ if(!studentOwes(s))return false; } else if(sqFilter==='da_dong'){ if(studentPayStatus(s)!=='paid')return false; } else if(sqFilter==='chua_dong'){ if(studentPayStatus(s)!=='due')return false; } else if(sqFilter!=='all'&&s.trang_thai!==sqFilter){return false;} if(sqQuery){const q=norm(sqQuery); if(!norm(s.ho_ten).includes(q)&&!norm(s.ma_hoc_sinh).includes(q))return false;} return true; });
  if(!students.length){ L.innerHTML='<div class="state"><div class="big">Chưa có học sinh nào</div>'+(canWrite()?'Bấm “Thêm học sinh” để tạo em đầu tiên.':'Chưa có dữ liệu.')+'</div>'; return; }
  if(!rows.length){ L.innerHTML='<div class="state"><div class="big">Không tìm thấy</div>Thử đổi bộ lọc hoặc từ khóa.</div>'; return; }
  L.innerHTML='<div class="group">'+rows.map(s=>{
    const lops=(s.dang_ky_lop||[]).filter(d=>d.lop_hoc && d.trang_thai!=='da_nghi').map(d=>d.lop_hoc.ten_lop);
    const ps=isManager()?studentPayStatus(s):null;
    const parts=[s.ma_hoc_sinh];
    if(lops.length) lops.forEach(l=>parts.push(l)); else parts.push('Chưa xếp lớp');
    if(s.trang_thai!=='dang_hoc') parts.push(`<span class="stt ${s.trang_thai}" style="font-size:inherit">${ST[s.trang_thai]||s.trang_thai}</span>`);
    if(ps==='due') parts.push(`<span class="unpaid">Chưa đóng</span>`);
    if(owesN(s)) parts.push(`<span class="unpaid">Nợ ${owesN(s)} buổi</span>`);
    const meta=parts.map((p,i)=>i===0?p:`<span class="sep">·</span>${p}`).join('');
    return `<div class="row tap haslead" data-id="${s.id}">
      <div class="lead"><div class="avatar" style="background:${avaC(s.ma_hoc_sinh)}">${ini1(s.ho_ten)}</div></div>
      <div class="main"><div class="t">${s.ho_ten}</div><div class="meta">${meta}</div></div>
      <i class="hgi-stroke hgi-arrow-right-01 rchev"></i>
    </div>`;
  }).join('')+'</div>';
  L.querySelectorAll('.row').forEach(el=>{ el.onclick=()=>openStudentDetail(students.find(s=>s.id===el.dataset.id)); });
}
function studentPayLines(s){
  const lines=[];
  (s.dang_ky_lop||[]).forEach(d=>{
    if(!d.lop_hoc || d.trang_thai==='da_nghi') return;
    let maxKy=null, pending=null;
    payments.forEach(p=>{ if(p.loai!=='hoc_phi'||p.dang_ky_lop_id!==d.id) return; if(p.trang_thai==='da_thu'&&p.ky_den){ if(!maxKy||p.ky_den>maxKy) maxKy=p.ky_den; } if(p.trang_thai==='cho_thanh_toan') pending=p; });
    lines.push({hsId:s.id, ma:s.ma_hoc_sinh, hoTen:s.ho_ten, enrollId:d.id, lopTen:d.lop_hoc.ten_lop, fee:Number(d.lop_hoc.hoc_phi_thang)||0, giam:Number(s.giam_gia_phan_tram)||0, maxKyDen:maxKy, pending});
  });
  return lines;
}
function studentPayStatus(s){
  const lines=studentPayLines(s);
  if(!lines.length) return null;
  const allPaid=lines.every(l=> l.maxKyDen && new Date(l.maxKyDen)>=new Date());
  return allPaid ? 'paid' : 'due';
}
function openStudentPhieuPicker(s){
  const lines=studentPayLines(s);

  $('#actBody').innerHTML=`<div class="achead"><div><div class="atitle">Tạo phiếu học phí</div><div class="asub">${s.ho_ten} · chọn lớp</div></div><button class="aclose" onclick="closeAct()"><i class="hgi-stroke hgi-cancel-01"></i></button></div>
    ${lines.map(l=>`<div class="actopt" data-enroll="${l.enrollId}" ${l.pending?`data-pending="${l.pending.id}"`:''}><span class="aoic" style="background:${avaC(l.lopTen)}">${l.lopTen.slice(0,3).toUpperCase()}</span><div class="aotxt"><div class="t">${l.lopTen}</div><div class="d">${l.pending?'Có phiếu chờ — xem QR':(l.maxKyDen?'Đã đóng tới '+l.maxKyDen.split('-').reverse().join('/'):'Chưa đóng')}</div></div></div>`).join('')}`;
  $('#actBody').querySelectorAll('.actopt').forEach(o=>o.onclick=()=>{ closeAct(); const l=lines.find(x=>x.enrollId===o.dataset.enroll); if(l) openPayLineActions(l); });
  showAct();
}

async function saveStudent(){
  const ten=$('#f_ten').value.trim(), ma=$('#f_ma').value.trim().toUpperCase();
  if(!ten) return toast('Chưa nhập họ tên',false);
  if(!ma) return toast('Chưa nhập mã học sinh',false);
  const btn=$('#saveS'); btn.disabled=true; const old=btn.innerHTML; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const payload={ma_hoc_sinh:ma, ho_ten:ten, ngay_sinh:$('#f_ns').value||null, gioi_tinh:formGioiTinh, truong_hoc:$('#f_truong').value.trim()||null, ngay_bat_dau:$('#f_batdau').value||null, trang_thai:formStatus, ghi_chu:$('#f_ghichu').value.trim()||null, ngay_hen_test:($('#f_hentest')&&$('#f_hentest').value)||null};

  if(editingId){ const r=await db.from('hoc_sinh').update(payload).eq('id',editingId); err=r.error; }
  else { const r=await db.from('hoc_sinh').insert(payload).select('id').single(); err=r.error; if(!err)hsId=r.data.id; }

  const phTen=$('#f_phten').value.trim(), phSdt=$('#f_phsdt').value.trim(), phQh=formQuanHe;
  if(phTen||phSdt){
    const ex=editingId? (students.find(x=>x.id===editingId)?.phu_huynh?.[0]) : null;
    if(ex) await db.from('phu_huynh').update({ho_ten:phTen||null,quan_he:phQh,so_dien_thoai:phSdt||null}).eq('id',ex.id);
    else await db.from('phu_huynh').insert({hoc_sinh_id:hsId,ho_ten:phTen||null,quan_he:phQh,so_dien_thoai:phSdt||null});
  }
  const lopSel = (!editingId && $('#f_lop')) ? $('#f_lop').value : '';
  if(lopSel){ await db.from('dang_ky_lop').insert({hoc_sinh_id:hsId, lop_hoc_id:lopSel, trang_thai:'dang_hoc'}); await loadClasses(); }

}

function weekStrip(days){ const d=(days||'').split(',').map(x=>x.trim()); return '<div class="week">'+DAYS.map(x=>`<div class="day ${d.includes(x)?'on':''}">${x}</div>`).join('')+'</div>'; }
function renderClasses(){
  const L=$('#list');
  const rows=classes.filter(c=>{ if(!lopQuery)return true; const q=norm(lopQuery); return norm(c.ten_lop).includes(q)||norm(c.giao_vien?.ho_ten||'').includes(q); });
  if(!classes.length){ L.innerHTML='<div class="state"><div class="big">Chưa có lớp nào</div>'+(isManager()?'Bấm “Tạo lớp mới”.':'Chưa có dữ liệu.')+'</div>'; return; }
  if(!rows.length){ L.innerHTML='<div class="state"><div class="big">Không tìm thấy</div>Thử từ khóa khác.</div>'; return; }
  const now=new Date();
  const todayCode=DAYS[(now.getDay()+6)%7];
  const todayISO=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const nowMin=now.getHours()*60+now.getMinutes();
  function timing(c){
    const days=(c.cac_ngay_trong_tuan||'').split(',').map(x=>x.trim());
    if(c.trang_thai!=='dang_hoc' || !days.includes(todayCode) || !c.gio_bat_dau) return {rank:2, key:9999, started:false};
    const [sh,sm]=c.gio_bat_dau.split(':').map(Number); const startMin=sh*60+(sm||0);
    const [eh,em]=(c.gio_ket_thuc||c.gio_bat_dau).split(':').map(Number); const endMin=eh*60+(em||0);
    if(nowMin>=startMin && nowMin<=endMin) return {rank:0, key:startMin, started:true};
    if(nowMin<startMin) return {rank:1, key:startMin, started:false};
    return {rank:2, key:9999, started:true};
  }
  const sorted=rows.map(c=>({c, t:timing(c)})).sort((a,b)=>a.t.rank-b.t.rank || a.t.key-b.t.key);
  L.innerHTML=sorted.map(({c,t})=>{
    const parts=[c.giao_vien?.ho_ten||'Chưa gán GV', 'Phòng '+(c.phong||'—')]; if(c.gio_bat_dau) parts.push(c.gio_bat_dau.slice(0,5));
    const meta=parts.map((p,i)=>i===0?p:`<span class="sep">·</span>${p}`).join('');
    const total=headcount(c);
    let countHtml;
    if(t.started && t.rank!==2){
      const present=new Set(diemdanh.filter(d=>d.ngay===todayISO && d.lop_hoc_id===c.id).map(d=>d.hoc_sinh_id)).size;
      const full=present>=total;
      countHtml=`<i class="hgi-stroke hgi-user-multiple-02" style="font-size:15px;color:var(--faint)"></i><b style="color:${full?'var(--ok)':'var(--danger)'}">${present}/${total}</b> điểm danh`;
    } else {
      countHtml=`<i class="hgi-stroke hgi-user-multiple-02" style="font-size:15px;color:var(--faint)"></i><b style="color:var(--ink)">${total}</b> học sinh`;
    }
    return `<div class="lopcard" data-id="${c.id}">
      <div style="display:flex;align-items:center;gap:11px">
        <div style="width:44px;height:44px;flex:none;border-radius:50%;background:${avaC(c.ten_lop)};color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px">${(c.level||c.ten_lop).slice(0,3).toUpperCase()}</div>
        <div class="main" style="flex:1;min-width:0"><div class="t">${c.ten_lop}</div><div class="meta">${meta}</div></div>
        <span class="spill ${c.trang_thai}" style="flex:none">${CST[c.trang_thai]||c.trang_thai}</span>
      </div>
      ${weekStrip(c.cac_ngay_trong_tuan)}
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)">
        <span style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-weight:600">${countHtml}</span>
        <span style="font-weight:600;font-size:13.5px;font-family:'Inter',sans-serif">${vnd(c.hoc_phi_thang)}đ <span style="color:var(--faint);font-weight:500">/tháng</span></span>
      </div>
    </div>`;
  }).join('');
  L.querySelectorAll('.lopcard').forEach(el=>{ el.onclick=()=>openClassDetail(classes.find(c=>c.id===el.dataset.id)); });
}

  if(!phi)return toast('Chưa nhập học phí',false);
  if(!cformDays.length)return toast('Chọn ít nhất 1 ngày học',false);
  const btn=$('#saveC'); btn.disabled=true; const old=btn.innerHTML; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const order=d=>DAYS.indexOf(d);
  const payload={ten_lop:ten, level:$('#c_lvl').value, phong:$('#c_phong').value.trim()||null, giao_vien_id:$('#c_gv').value||null, hoc_phi_thang:phi, cac_ngay_trong_tuan:[...cformDays].sort((a,b)=>order(a)-order(b)).join(','), gio_bat_dau:$('#c_gbd').value||null, gio_ket_thuc:$('#c_gkt').value||null, trang_thai:cformStatus, telegram_group_id:$('#c_tele').value.trim()||null};
  let err=null;
  if(cEditingId){ const r=await db.from('lop_hoc').update(payload).eq('id',cEditingId); err=r.error; }
  else { const r=await db.from('lop_hoc').insert(payload); err=r.error; }
  btn.disabled=false; btn.innerHTML=old;
  if(err)return toast(err.message,false);
  await loadClasses(); closePage(); if(view==='lop')renderClasses();
  if(cEditingId && curClass && curClass.id===cEditingId){ curClass=classes.find(x=>x.id===cEditingId)||curClass; openClassDetail(curClass); }
  toast(cEditingId?'Đã lưu thay đổi':'Đã tạo lớp '+ten);
}

/* ===== HỌC BÙ (gắn trong hồ sơ học sinh) ===== */
const studentOwes=s=>makeups.some(m=>m.hoc_sinh_id===s.id && m.trang_thai==='chua_bu');
const owesN=s=>makeups.filter(m=>m.hoc_sinh_id===s.id && m.trang_thai==='chua_bu').length;
const oweCount=()=>new Set(makeups.filter(m=>m.trang_thai==='chua_bu').map(m=>m.hoc_sinh_id)).size;
async function afterMakeupChange(){ await loadMakeups(); if(view==='hoc_sinh')renderStudents(); if(view==='dashboard')buildDashboard(); if(curStudent)openStudentDetail(curStudent); }
function openMakeupActions(m){
  const done=m.trang_thai==='da_bu';
  $('#actBody').innerHTML=`<div class="achead"><div><div class="atitle">${m.hoc_sinh?m.hoc_sinh.ho_ten:''}</div><div class="asub">${m.lop_hoc?m.lop_hoc.ten_lop:''} · vắng ${fmtDate(m.ngay_vang)}${m.ghi_chu?' · '+m.ghi_chu:''}</div></div><button class="aclose" onclick="closeAct()"><i class="hgi-stroke hgi-cancel-01"></i></button></div>
    ${done
      ? `<div class="actopt" id="undo"><i class="hgi-stroke hgi-repeat-01" style="color:var(--warn)"></i>Hoàn tác về “chưa bù”</div>`
      : `<div class="sheetcard"><div class="field" style="margin-top:10px"><label>Ngày đi học bù</label><div class="datefield"><input id="hb_ngaybu" type="date" value="${new Date().toISOString().slice(0,10)}"><span class="dfph">Chọn ngày đi học bù</span></div></div></div>
         <button class="btn primary block" id="markbu" style="margin-top:14px">Đánh dấu đã bù</button>`}
    <div class="actopt" id="delhb" style="margin-top:10px"><i class="hgi-stroke hgi-cancel-01" style="color:var(--danger)"></i><span style="color:var(--danger)">Xóa phiếu</span></div>`;
  if(done) $('#undo').onclick=()=>updMakeup(m.id,{trang_thai:'chua_bu', ngay_bu:null},'Đã hoàn tác');
  else $('#markbu').onclick=()=>updMakeup(m.id,{trang_thai:'da_bu', ngay_bu:$('#hb_ngaybu').value||null},'Đã đánh dấu bù xong');
  $('#delhb').onclick=async()=>{ await db.from('phieu_hoc_bu').delete().eq('id',m.id); closeAct(); await afterMakeupChange(); toast('Đã xóa phiếu'); };
  showAct();
}
async function updMakeup(id, patch, msg){
  const {error}=await db.from('phieu_hoc_bu').update(patch).eq('id',id);
  closeAct(); if(error)return toast(error.message,false);
  await afterMakeupChange(); toast(msg);
}
function openMakeupForm(fixed){
  if(!classes.length){ toast('Chưa có lớp nào — tạo lớp trước',false); return; }
  const opts=students.filter(s=>s.trang_thai!=='da_nghi');
  $('#sheetBody').innerHTML=`
    <div class="achead"><div><div class="atitle">Ghi buổi vắng</div><div class="asub">Tạo phiếu học bù cho em nghỉ buổi</div></div><button class="aclose" onclick="closeSheets()"><i class="hgi-stroke hgi-cancel-01"></i></button></div>
    ${fixed?`<div class="summ"><div class="avatar av" style="background:${avaC(fixed.ma_hoc_sinh)}">${ini1(fixed.ho_ten)}</div><div><div class="nm">${fixed.ho_ten}</div><div class="cd">${fixed.ma_hoc_sinh}</div></div></div><input type="hidden" id="hb_hs" value="${fixed.id}">`:''}
    <div class="sheetcard">
      ${!fixed?`<div class="field" style="margin-top:10px"><label>Học sinh <span class="req">*</span></label><select id="hb_hs">${opts.map(s=>`<option value="${s.id}">${s.ho_ten} — ${s.ma_hoc_sinh}</option>`).join('')}</select></div>`:''}
      <div class="field" style="${fixed?'margin-top:10px':''}"><label>Lớp <span class="req">*</span></label><select id="hb_lop">${classes.map(c=>`<option value="${c.id}">${c.ten_lop}</option>`).join('')}</select></div>
      <div class="field"><label>Ngày vắng <span class="req">*</span></label><div class="datefield"><input id="hb_ngay" type="date" value="${new Date().toISOString().slice(0,10)}"><span class="dfph">Chọn ngày vắng</span></div></div>
      <div class="field"><label>Ghi chú</label><textarea id="hb_note" rows="2" placeholder="Lý do nghỉ (tùy chọn)…"></textarea></div>
    </div>
    <button class="btn primary block safe-b" id="hb_save" style="margin-top:18px">Tạo phiếu học bù</button>`;
  $('#hb_save').onclick=saveMakeup;
  show('#sheet');
}
async function saveMakeup(){
  const hs=$('#hb_hs').value, lop=$('#hb_lop').value, ngay=$('#hb_ngay').value;
  if(!hs)return toast('Chưa chọn học sinh',false);
  if(!lop)return toast('Chưa chọn lớp',false);
  if(!ngay)return toast('Chưa chọn ngày vắng',false);
  const btn=$('#hb_save'); btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const {error}=await db.from('phieu_hoc_bu').insert({hoc_sinh_id:hs, lop_hoc_id:lop, ngay_vang:ngay, trang_thai:'chua_bu', ghi_chu:$('#hb_note').value.trim()||null});
  btn.disabled=false; btn.textContent=old;
  if(error)return toast(error.message,false);
  toast('Đã tạo phiếu học bù');
  if(curStudent) await afterMakeupChange(); else { await loadMakeups(); closeSheets(); }
}

/* ===== DASHBOARD (chỉ quản lý) ===== */
function buildDashboard(){
  const dangHoc=students.filter(s=>s.trang_thai==='dang_hoc').length;
  const lopActive=classes.filter(c=>c.trang_thai!=='da_dong').length;
  const canBu=oweCount();
  const nowD=new Date(), dY=nowD.getFullYear(), dMo=nowD.getMonth();
  const month=String(dMo+1).padStart(2,'0')+'/'+dY;
  const inM=thuchi.filter(t=>{const d=new Date(t.ngay); return d.getFullYear()===dY&&d.getMonth()===dMo;});
  const dThu=inM.filter(t=>t.loai==='thu').reduce((a,t)=>a+Number(t.so_tien),0);
  const dChi=inM.filter(t=>t.loai==='chi').reduce((a,t)=>a+Number(t.so_tien),0);
  const dConlai=dThu-dChi;
  const owing=students.filter(s=>studentOwes(s));
  const choTest=students.filter(s=>s.trang_thai==='cho_test');
  const hocThu=students.filter(s=>s.trang_thai==='hoc_thu');
  const prospects=[...choTest,...hocThu];
  const DOW=['CN','T2','T3','T4','T5','T6','T7'];
  const todayCode=DOW[nowD.getDay()];
  const todayISO=dY+'-'+String(dMo+1).padStart(2,'0')+'-'+String(nowD.getDate()).padStart(2,'0');
  const nowMin=nowD.getHours()*60+nowD.getMinutes();
  const presentIds=new Set(diemdanh.filter(d=>d.ngay===todayISO && d.lop_hoc_id).map(d=>d.lop_hoc_id+'|'+d.hoc_sinh_id));
  const classesToday=classes.filter(c=>c.trang_thai!=='da_dong' && (c.cac_ngay_trong_tuan||'').split(',').includes(todayCode))
    .sort((a,b)=>(a.gio_bat_dau||'').localeCompare(b.gio_bat_dau||''));
  const attendanceRows = classesToday.length
    ? classesToday.map(c=>{
        const roster=students.filter(s=>(s.trang_thai==='dang_hoc'||s.trang_thai==='bao_luu') && (s.dang_ky_lop||[]).some(d=>d.trang_thai!=='da_nghi' && d.lop_hoc && d.lop_hoc.id===c.id));
        const expected=roster.length;
        const present=roster.filter(s=>presentIds.has(c.id+'|'+s.id)).length;
        const [sh,sm]=(c.gio_bat_dau||'0:0').split(':').map(Number);
        const started=c.gio_bat_dau?(nowMin>=(sh*60+(sm||0))):false;
        const timeStr=c.gio_bat_dau?c.gio_bat_dau.slice(0,5)+(c.gio_ket_thuc?'–'+c.gio_ket_thuc.slice(0,5):''):'';
        let statusText, statusColor='var(--faint)', statusHtml, missingHtml='';
        if(!started){ statusText='Chưa tới giờ'; }
        else if(!expected){ statusText='Chưa có học sinh'; }
        else if(present>=expected){ statusText='Đủ'; statusColor='var(--st-dang-hoc)'; }
        else {
          const missing=roster.filter(s=>!presentIds.has(c.id+'|'+s.id));
          statusText=`Thiếu ${missing.length} em`; statusColor='var(--danger)';
          const rows=missing.map(s=>`<div class="row tap haslead" data-id="${s.id}"><div class="lead"><div class="avatar" style="background:${avaC(s.ma_hoc_sinh)}">${ini1(s.ho_ten)}</div></div><div class="main"><div class="t">${s.ho_ten}</div><div class="meta">${s.ma_hoc_sinh}</div></div><i class="hgi-stroke hgi-arrow-right-01 rchev"></i></div>`).join('');
          missingHtml=`<div class="missBlock" id="miss-${c.id}" style="display:none">${rows}</div>`;
        }
        statusHtml = missingHtml
          ? `<span class="missToggle" data-target="miss-${c.id}" style="color:${statusColor};font-weight:600;white-space:nowrap;flex:none;display:inline-flex;align-items:center;gap:3px;cursor:pointer">${statusText}<i class="hgi-stroke hgi-arrow-down-01" style="font-size:13px;transition:transform .15s;transform:rotate(-90deg)"></i></span>`
          : `<span style="color:${statusColor};font-weight:600;white-space:nowrap;flex:none">${statusText}</span>`;
        const parts=[timeStr, c.giao_vien?.ho_ten||'Chưa gán GV'];
        if(started && expected) parts.push(present+'/'+expected);
        const meta=parts.map((p,i)=>i===0?p:`<span class="sep">·</span>${p}`).join('');
        return `<div class="group"><div class="row tap haslead classrow" data-cid="${c.id}"><div class="lead"><div class="avatar" style="background:${avaC(c.ten_lop)};font-size:12px">${(c.level||c.ten_lop).slice(0,3).toUpperCase()}</div></div><div class="main"><div class="t">${c.ten_lop}</div><div class="meta">${meta}</div></div>${statusHtml}<i class="hgi-stroke hgi-arrow-right-01 rchev"></i></div>${missingHtml}</div>`;
      }).join('')
    : '<div style="color:#9AA4B2;font-size:14px;padding:6px 2px">Hôm nay không có lớp nào.</div>';
  const warnRows = owing.length
    ? '<div class="group">'+owing.slice(0,8).map(s=>{
        const parts=[s.ma_hoc_sinh, `<span class="unpaid">Nợ ${owesN(s)} buổi</span>`];
        const meta=parts.map((p,i)=>i===0?p:`<span class="sep">·</span>${p}`).join('');
        return `<div class="row tap haslead" data-id="${s.id}"><div class="lead"><div class="avatar" style="background:${avaC(s.ma_hoc_sinh)}">${ini1(s.ho_ten)}</div></div><div class="main"><div class="t">${s.ho_ten}</div><div class="meta">${meta}</div></div><i class="hgi-stroke hgi-arrow-right-01 rchev"></i></div>`;
      }).join('')+'</div>'
    : '<div style="color:#9AA4B2;font-size:14px;padding:6px 2px">Không có em nào đang nợ buổi.</div>';
  const prospectRows = prospects.length
    ? '<div class="group">'+prospects.slice(0,10).map(s=>{
        const parts=[s.ma_hoc_sinh];
        if(s.ngay_hen_test) parts.push('test '+fmtDate(s.ngay_hen_test));
        parts.push(`<span class="stt ${s.trang_thai}" style="font-size:inherit">${ST[s.trang_thai]}</span>`);
        const meta=parts.map((p,i)=>i===0?p:`<span class="sep">·</span>${p}`).join('');
        return `<div class="row tap haslead" data-id="${s.id}"><div class="lead"><div class="avatar" style="background:${avaC(s.ma_hoc_sinh)}">${ini1(s.ho_ten)}</div></div><div class="main"><div class="t">${s.ho_ten}</div><div class="meta">${meta}</div></div><i class="hgi-stroke hgi-arrow-right-01 rchev"></i></div>`;
      }).join('')+'</div>'
    : '<div style="color:#9AA4B2;font-size:14px;padding:6px 2px">Không có em nào đang chờ test / học thử.</div>';
  $('#screen').innerHTML=`
    <div class="dash">
      <div class="titlerow" style="margin:2px 0 14px"><h1>Tổng quan</h1></div>
      <div class="cfhero" data-go="thu_chi"><div class="lbl">Dòng tiền tháng ${month}</div><div class="big${dConlai<0?' neg':''}">${vnd(dConlai)}<span style="font-size:20px;color:var(--faint)"> đ</span></div><div class="note">${dThu||dChi?`Thu ${vnd(dThu)}đ · Chi ${vnd(dChi)}đ`:'Chưa có giao dịch — ghi ở tab Thu chi. Học phí sẽ tự vào khi bật SePay.'}</div></div>
      <div class="tiles">
        <div class="tile" data-go="hs:dang_hoc"><div class="n">${dangHoc}</div><div class="l">Học sinh đang học</div></div>
        <div class="tile" data-go="lop"><div class="n">${lopActive}</div><div class="l">Lớp đang hoạt động</div></div>
        <div class="tile" data-go="hs:cho_test"><div class="n" style="color:#7C3AED">${choTest.length}</div><div class="l">Chờ test</div></div>
        <div class="tile" data-go="hs:hoc_thu"><div class="n" style="color:#0E7490">${hocThu.length}</div><div class="l">Học thử</div></div>
        <div class="tile warn" data-go="hs:can_hoc_bu"><div class="n">${canBu}</div><div class="l">Em cần học bù</div></div>
        <div class="tile" data-go="hoc_phi"><div class="n" style="color:var(--danger)">${(typeof dueList==='function')?dueList().length:0}</div><div class="l">Đến hạn đóng</div></div>
      </div>
      <div class="dsec">Lớp học hôm nay</div>
      ${attendanceRows}
      <div class="dsec">Tuyển sinh — chờ test / học thử</div>
      ${prospectRows}
      <div class="dsec">Cần chú ý — nợ buổi học bù</div>
      ${warnRows}
      <div class="infonote"><b>Sắp có:</b> doanh thu &amp; công nợ học phí sẽ tự hiện ở đây khi mình bật <b>thu học phí (SePay)</b>. Điểm danh Hikvision đã tích hợp — số liệu sẽ bắt đầu đổ về khi kết nối máy xong.</div>
    </div>`;
  $('#screen').querySelectorAll('.dash .row').forEach(r=>{ if(r.dataset.id) r.onclick=()=>openStudentDetail(students.find(s=>s.id===r.dataset.id)); });
  $('#screen').querySelectorAll('.dash .classrow').forEach(r=>r.onclick=()=>openClassDetail(classes.find(c=>c.id===r.dataset.cid)));
  $('#screen').querySelectorAll('.dash .missToggle').forEach(t=>{
    t.onclick=(e)=>{
      e.stopPropagation();
      const target=document.getElementById(t.dataset.target);
      const icon=t.querySelector('i');
      const willOpen=target.style.display==='none';
      target.style.display=willOpen?'':'none';
      icon.style.transform=willOpen?'':'rotate(-90deg)';
    };
  });
  $('#screen').querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>{
    const g=el.dataset.go;
    if(g==='lop'){ lopQuery=''; switchView('lop'); }
    else if(g==='thu_chi'){ switchView('thu_chi'); }
    else if(g==='hoc_phi'){ switchView('hoc_phi'); }
    else if(g.startsWith('hs:')){ sqQuery=''; sqFilter=g.slice(3); switchView('hoc_sinh'); }
  });
}

/* ===== THU CHI (chỉ quản lý) ===== */
function buildThuChi(){ if(tcY===null){ const n=new Date(); tcY=n.getFullYear(); tcM=n.getMonth(); } renderThuChi(); }
function renderThuChi(){
  const inM=thuchi.filter(t=>{const d=new Date(t.ngay); return d.getFullYear()===tcY && d.getMonth()===tcM;});
  const thu=inM.filter(t=>t.loai==='thu').reduce((a,t)=>a+Number(t.so_tien),0);
  const chi=inM.filter(t=>t.loai==='chi').reduce((a,t)=>a+Number(t.so_tien),0);
  const rows = inM.length
    ? `<div class="group">${[...inM].sort((a,b)=> a.ngay<b.ngay?1:-1).map(t=>{const isThu=t.loai==='thu'; return `<div class="row tap" data-id="${t.id}"><div class="main"><div class="t">${t.danh_muc}</div><div class="meta">${fmtDate(t.ngay)}${t.ghi_chu?' · '+t.ghi_chu:''}</div></div><span class="tcamt ${t.loai}">${isThu?'+':'−'}${vnd(t.so_tien)}đ</span></div>`;}).join('')}</div>`
    : '<div class="state"><div class="big">Chưa có khoản nào tháng này</div>Bấm “Ghi khoản” để thêm thu hoặc chi.</div>';
  $('#screen').innerHTML=`
    <div class="dash">
      <div class="titlerow" style="margin:2px 0 14px"><h1>Thu chi</h1></div>
      <div class="monthnav"><button id="tcPrev">‹</button><div class="mlabel">Tháng ${String(tcM+1).padStart(2,'0')}/${tcY}</div><button id="tcNext">›</button></div>
      <div class="sumgrid">
        <div class="sumcard thu"><div class="n">${vnd(thu)}</div><div class="l">Thu</div></div>
        <div class="sumcard chi"><div class="n">${vnd(chi)}</div><div class="l">Chi</div></div>
        <div class="sumcard"><div class="n" style="${thu-chi<0?'color:var(--danger)':''}">${vnd(thu-chi)}</div><div class="l">Còn lại</div></div>
      </div>
      ${rows}
    </div>`;
  $('#tcPrev').onclick=()=>{ tcM--; if(tcM<0){tcM=11;tcY--;} renderThuChi(); };
  $('#tcNext').onclick=()=>{ tcM++; if(tcM>11){tcM=0;tcY++;} renderThuChi(); };
  $('#screen').querySelectorAll('.row[data-id]').forEach(r=>r.onclick=()=>openTcForm(thuchi.find(t=>t.id===r.dataset.id)));
}
function fillTcCats(sel){ $('#tc_cat').innerHTML=CAT[tcLoai].map(c=>`<option ${sel===c?'selected':''}>${c}</option>`).join(''); }
function openTcForm(t){
  tcEditId=t?t.id:null; tcLoai=t?t.loai:'chi';
  $('#sheetBody').innerHTML=`
    <div class="achead"><div><div class="atitle">${t?'Sửa khoản':'Ghi khoản thu chi'}</div><div class="asub">Sổ thu chi đơn giản theo tháng</div></div><button class="aclose" onclick="closeSheets()"><i class="hgi-stroke hgi-cancel-01"></i></button></div>
    <div class="sheetcard">
      <div class="field" style="margin-top:10px"><label>Loại</label><div class="chipset" id="tc_loai"><button class="choice ${tcLoai==='chi'?'on':''}" data-v="chi">Chi (tiền ra)</button><button class="choice ${tcLoai==='thu'?'on':''}" data-v="thu">Thu (tiền vào)</button></div></div>
      <div class="field"><label>Danh mục <span class="req">*</span></label><select id="tc_cat"></select></div>
      <div class="field"><label>Số tiền <span class="req">*</span></label><div class="feewrap"><input id="tc_tien" type="number" inputmode="numeric" value="${t?t.so_tien:''}" placeholder="0"><span class="unit">đ</span></div></div>
      <div class="field"><label>Ngày <span class="req">*</span></label><div class="datefield"><input id="tc_ngay" type="date" value="${t?t.ngay:new Date().toISOString().slice(0,10)}"><span class="dfph">Chọn ngày</span></div></div>
      <div class="field"><label>Ghi chú</label><textarea id="tc_note" rows="2" placeholder="VD: Cô Hương – 20 buổi × 150k">${t?(t.ghi_chu||''):''}</textarea></div>
    </div>
    <button class="btn primary block safe-b" id="tc_save" style="margin-top:16px">${t?'Lưu thay đổi':'Lưu khoản'}</button>
    ${t?'<button class="btn danger block" id="tc_del" style="margin-top:10px">Xóa khoản này</button>':''}`;
  fillTcCats(t?t.danh_muc:null);
  $('#tc_loai').addEventListener('click',e=>{const b=e.target.closest('button'); if(!b)return; tcLoai=b.dataset.v; document.querySelectorAll('#tc_loai button').forEach(x=>x.classList.toggle('on',x===b)); fillTcCats();});
  $('#tc_save').onclick=saveTc;
  if(t) $('#tc_del').onclick=()=>delTc(t.id);
  show('#sheet');
}
async function saveTc(){
  const tien=+$('#tc_tien').value||0, cat=$('#tc_cat').value, ngay=$('#tc_ngay').value;
  if(!tien)return toast('Chưa nhập số tiền',false);
  if(!ngay)return toast('Chưa chọn ngày',false);
  const btn=$('#tc_save'); btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const payload={loai:tcLoai, danh_muc:cat, so_tien:tien, ngay, ghi_chu:$('#tc_note').value.trim()||null};
  let err;
  if(tcEditId){ const r=await db.from('thu_chi').update(payload).eq('id',tcEditId); err=r.error; }
  else { const r=await db.from('thu_chi').insert(payload); err=r.error; }
  btn.disabled=false; btn.textContent=old;
  if(err)return toast(err.message,false);

function genCK(ma){ const mm=String(new Date().getMonth()+1).padStart(2,'0'); const r=Math.random().toString(36).slice(2,4).toUpperCase(); return (ma+'T'+mm+r).toUpperCase().replace(/[^A-Z0-9]/g,''); }
function qrUrl(sotien, nd){ return `https://img.vietqr.io/image/${BANK.bin}-${BANK.stk}-qr_only.png?amount=${sotien}&addInfo=${encodeURIComponent(nd)}&accountName=${encodeURIComponent(BANK.ten)}`; }
function dueList(){
  // các phiếu học phí đã thu / đang chờ, gom theo đăng ký lớp
  const paidMax={}, pending={};
  payments.forEach(p=>{
    if(p.loai!=='hoc_phi'||!p.dang_ky_lop_id) return;
    if(p.trang_thai==='da_thu' && p.ky_den){ if(!paidMax[p.dang_ky_lop_id]||p.ky_den>paidMax[p.dang_ky_lop_id]) paidMax[p.dang_ky_lop_id]=p.ky_den; }
    if(p.trang_thai==='cho_thanh_toan') pending[p.dang_ky_lop_id]=true;
  });
  const today=toISO(new Date()); const list=[];
  students.forEach(s=>{
    if(s.trang_thai!=='dang_hoc'&&s.trang_thai!=='bao_luu') return;
    (s.dang_ky_lop||[]).forEach(d=>{
      if(!d.lop_hoc||d.trang_thai==='da_nghi') return;
      if(pending[d.id]) return; // đã có phiếu chờ, không tính đến hạn
      const maxKy=paidMax[d.id]||null;
      let due=false, kind='new';
      if(!maxKy){ due=true; kind='new'; }
      else { const dl=Math.round((new Date(maxKy)-new Date(today))/86400000); if(dl<0){due=true;kind='over';} else if(dl<=7){due=true;kind='soon';} }
      if(due) list.push({hsId:s.id, ma:s.ma_hoc_sinh, hoTen:s.ho_ten, enrollId:d.id, lopTen:d.lop_hoc.ten_lop, fee:Number(d.lop_hoc.hoc_phi_thang)||0, giam:Number(s.giam_gia_phan_tram)||0, maxKyDen:maxKy, kind});
    });
  });
  return list;
}

    <div class="sheetcard">
      <div class="field" style="margin-top:10px"><label>Hình thức</label><div class="chipset" id="mpmethod"><button class="choice on" data-v="Tiền mặt">Tiền mặt</button><button class="choice" data-v="CK tay">CK tay</button></div></div>
      <div class="field"><label>Số tháng đóng</label><div class="chipset" id="mpseg"><button class="choice on" data-m="1">1 tháng</button><button class="choice" data-m="2">2 tháng</button><button class="choice" data-m="3">3 tháng</button></div></div>
      <div class="field"><label>Tính từ tháng</label><input id="mpstart" type="month" value="${hpStart}"><div class="hint">Đóng từ trước khi có app thì chọn đúng tháng bắt đầu.</div></div>
      <div id="mpcalc"></div>
      <div class="two"><div class="field"><label>Số tiền thực thu (đ)</label><input id="mpamount" type="number" inputmode="numeric"><div class="hint">Tự tính sẵn theo học phí — sửa được nếu thu khác.</div></div><div class="field"><label>Số buổi đã học</label><input id="mpbuoi" type="number" inputmode="numeric" min="0" placeholder="Tùy chọn"></div></div>
    </div>
    <button class="btn primary block safe-b" id="mpmk" style="margin-top:16px">Xác nhận đã đóng</button>`;
  drawMarkCalc();
  $('#mpmethod').addEventListener('click',ev=>{const b=ev.target.closest('button'); if(!b)return; hpMethod=b.dataset.v; document.querySelectorAll('#mpmethod button').forEach(x=>x.classList.toggle('on',x===b));});
  $('#mpseg').addEventListener('click',ev=>{const b=ev.target.closest('button'); if(!b)return; hpMonths=+b.dataset.m; document.querySelectorAll('#mpseg button').forEach(x=>x.classList.toggle('on',x===b)); drawMarkCalc();});
  $('#mpstart').addEventListener('change',drawMarkCalc);
  $('#mpmk').onclick=doMarkPaid;
  $('#mpcancel').onclick=()=>{ if(curStudent)openStudentDetail(curStudent); else closeSheets(); };
  show('#sheet');
}
async function doMarkPaid(){
  const e=hpCtx, m=hpMonths;
  const raw=($('#mpamount')&&$('#mpamount').value)||'';
  const tot=Math.round(Number(String(raw).replace(/[^\d]/g,''))||0);
  if(!tot) return toast('Nhập số tiền thu',false);
  const buoiRaw=($('#mpbuoi')&&$('#mpbuoi').value)||'';
  const soBuoi=buoiRaw===''?null:Math.max(0,Math.round(Number(buoiRaw))||0);
  const {kyTu,kyDen}=markPeriod();
  const btn=$('#mpmk'); btn.disabled=true; btn.innerHTML='<span class="spinner-sm"></span> Đang lưu…';
  const {error}=await db.from('thanh_toan').insert({hoc_sinh_id:e.hsId, loai:'hoc_phi', dang_ky_lop_id:e.enrollId, so_thang:m, ky_tu:toISO(kyTu), ky_den:toISO(kyDen), so_tien:tot, so_buoi_da_hoc:soBuoi, noi_dung_ck:null, trang_thai:'da_thu', ngay_thanh_toan:new Date().toISOString(), ghi_chu:hpMethod});
  if(error){ btn.disabled=false; btn.textContent='Xác nhận đã đóng'; return toast(error.message,false); }
  await db.from('thu_chi').insert({loai:'thu', danh_muc:'Học phí', so_tien:tot, ngay:new Date().toISOString().slice(0,10), ghi_chu:e.hoTen+(e.lopTen?' · '+e.lopTen:'')+' · '+hpMethod});
  await Promise.all([loadPayments(), loadThuChi()]);
  if(view==='hoc_phi'){ closeSheets(); renderHocPhi(); }
  else if(curStudent){ openStudentDetail(curStudent); }
  else closeSheets();
  toast('Đã ghi thu '+vnd(tot)+'đ ('+hpMethod+')');
}
function qrShareText(p){
  return `HỌC PHÍ IMPETUS\nHọc sinh: ${(p.hoc_sinh&&p.hoc_sinh.ho_ten)||''}\nSố tiền: ${vnd(p.so_tien)}đ\nNgân hàng: ${BANK.nganHang}\nSố TK: ${BANK.stk}\nChủ TK: ${BANK.ten}\nNội dung CK: ${p.noi_dung_ck}\n\nQuét mã QR hoặc chuyển đúng nội dung để hệ thống tự ghi nhận đã đóng.`;
}
function getQRBlob(url){
  return new Promise(resolve=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=img.naturalWidth||360; c.height=img.naturalHeight||360; c.getContext('2d').drawImage(img,0,0); c.toBlob(b=>resolve(b),'image/png'); }catch(e){ resolve(null); } };
    img.onerror=()=>resolve(null); img.src=url;
  });
}
function _rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function buildPhieuImage(p){
  return new Promise(async(resolve)=>{
    try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const S=2, W=720, pad=48, qr=360, qx=(W-qr)/2;
        const F=(w,s)=>`${w} ${s}px "Inter", system-ui, sans-serif`;
        const rows=[['Học sinh',(p.hoc_sinh&&p.hoc_sinh.ho_ten)||''],['Ngân hàng',BANK.nganHang],['Số tài khoản',BANK.stk],['Chủ tài khoản',BANK.ten],['Nội dung CK',p.noi_dung_ck||'']];
        const qrTop=120, qrBox=qr+36, amountY=qrTop+qrBox+46, divY=amountY+40, infoTop=divY+38, step=46;
        const footY=infoTop+(rows.length-1)*step+44, H=footY+40;
        const c=document.createElement('canvas'); c.width=W*S; c.height=H*S;
        const x=c.getContext('2d'); x.scale(S,S); x.textBaseline='middle';
        x.fillStyle='#FFFFFF'; x.fillRect(0,0,W,H);
        // header
        x.fillStyle='#2747D9'; _rr(x,pad,42,46,46,13); x.fill();
        x.fillStyle='#fff'; x.font=F(800,25); x.textAlign='center'; x.fillText('I',pad+23,66);
        x.textAlign='left'; x.fillStyle='#16202E'; x.font=F(800,23); x.fillText('Impetus',pad+60,56);
        x.fillStyle='#6B7686'; x.font=F(500,15); x.fillText('Phiếu học phí',pad+60,78);
        // qr box
        x.fillStyle='#FFFFFF'; x.strokeStyle='#ECECEF'; x.lineWidth=1.5; _rr(x,qx-18,qrTop,qr+36,qr+36,22); x.fill(); x.stroke();
        x.drawImage(img,qx,qrTop+18,qr,qr);
        // amount
        x.textAlign='center'; x.fillStyle='#2747D9'; x.font=F(800,42); x.fillText(vnd(p.so_tien)+' đ',W/2,amountY);
        // divider
        x.strokeStyle='#ECECEF'; x.lineWidth=1; x.beginPath(); x.moveTo(pad,divY); x.lineTo(W-pad,divY); x.stroke();
        // info
        let iy=infoTop;
        rows.forEach(([k,v])=>{ x.fillStyle='#6B7686'; x.font=F(500,16); x.textAlign='left'; x.fillText(k,pad,iy); x.fillStyle='#16202E'; x.font=F(700,16); x.textAlign='right'; x.fillText(String(v),W-pad,iy); iy+=step; });
        // footer
        x.textAlign='center'; x.fillStyle='#9AA4B2'; x.font=F(500,13.5); x.fillText('Quét QR hoặc chuyển đúng nội dung — hệ thống tự ghi nhận đã đóng.',W/2,footY);
        c.toBlob(b=>resolve(b),'image/png');
      }catch(e){ resolve(null); }
    };
    img.onerror=()=>resolve(null);
    img.src=qrUrl(p.so_tien,p.noi_dung_ck);
  });
}
async function shareQR(p){
  const info=qrShareText(p), url=qrUrl(p.so_tien,p.noi_dung_ck);
  const blob=await buildPhieuImage(p);
  if(blob && navigator.canShare){
    const file=new File([blob],'phieu-hocphi.png',{type:'image/png'});
    if(navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file], text:info}); return; }catch(e){ if(e&&e.name==='AbortError')return; } }
  }
  if(navigator.share){ try{ await navigator.share({text:info, url}); return; }catch(e){ if(e&&e.name==='AbortError')return; } }
  copyQRInfo(p);
}
async function saveQR(p){
  const blob=await buildPhieuImage(p);
  if(blob){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='phieu-hocphi-'+(p.noi_dung_ck||'')+'.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),3000); toast('Đã lưu ảnh phiếu'); }
  else { window.open(qrUrl(p.so_tien,p.noi_dung_ck),'_blank'); toast('Không tạo được ảnh — đã mở QR để lưu tay',false); }
}
async function copyQRInfo(p){
  try{ await navigator.clipboard.writeText(qrShareText(p)); toast('Đã sao chép thông tin CK'); }
  catch(e){ toast('Không copy được — chép tay giúp em',false); }
}
function showQR(p){
  $('#sheetBody').innerHTML=`
    <div class="achead"><div><div class="atitle">Phiếu học phí</div><div class="asub">Gửi QR qua Zalo để phụ huynh tự đóng</div></div><button class="aclose" onclick="closeSheets()"><i class="hgi-stroke hgi-cancel-01"></i></button></div>
    <div class="qrcard" style="margin-top:14px">
      <div class="qrbox"><img src="${qrUrl(p.so_tien,p.noi_dung_ck)}" alt="QR" onerror="this.parentNode.innerHTML='<div style=&quot;padding:20px;font-size:13px;color:#9AA4B2&quot;>Không tải được ảnh QR (cần mạng). Nội dung CK: '+'${p.noi_dung_ck}'+'</div>'"></div>
      <div class="qramt">${vnd(p.so_tien)}đ</div>
      <div class="qrinfo">
        <div class="r"><span class="k">Học sinh</span><span class="v">${p.hoc_sinh?.ho_ten||''} · ${p.hoc_sinh?.ma_hoc_sinh||''}</span></div>
        <div class="r"><span class="k">Nội dung CK</span><span class="v mono">${p.noi_dung_ck}</span></div>
        <div class="r"><span class="k">Ngân hàng</span><span class="v">${BANK.nganHang}</span></div>
        <div class="r"><span class="k">Số tài khoản</span><span class="v mono">${BANK.stk}</span></div>
      </div>
    </div>
    <div class="qracts">
      <button class="qact primary" id="qShare"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/></svg>Chia sẻ QR</button>
      <button class="qact" id="qSave"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5M12 15V3"/></svg>Lưu ảnh</button>
      <button class="qact" id="qCopy"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy CK</button>
    </div>
    <div class="waitbar" style="margin-top:14px">Tiền về sẽ TỰ xác nhận (SePay). Cần thì đánh dấu tay bên dưới.</div>
    <div class="actopt" id="hpConfirm" style="margin-top:14px"><i class="hgi-stroke hgi-checkmark-circle-02"></i>Đánh dấu đã nhận tiền (thủ công)</div>
    <div class="actopt" id="hpCancel"><i class="hgi-stroke hgi-cancel-01" style="color:var(--danger)"></i><span style="color:var(--danger)">Hủy phiếu này</span></div>`;
  $('#qShare').onclick=()=>shareQR(p);
  $('#qSave').onclick=()=>saveQR(p);
  $('#qCopy').onclick=()=>copyQRInfo(p);
  $('#hpConfirm').onclick=()=>confirmPaid(p);
  $('#hpCancel').onclick=()=>cancelPhieu(p);
  show('#sheet');
}
async function confirmPaid(p){
  const {data,error}=await db.from('thanh_toan').update({trang_thai:'da_thu', ngay_thanh_toan:new Date().toISOString()}).eq('id',p.id).eq('trang_thai','cho_thanh_toan').select('id');
  if(error)return toast(error.message,false);
  if(data && data.length){ const lop=(p.dang_ky_lop&&p.dang_ky_lop.lop_hoc&&p.dang_ky_lop.lop_hoc.ten_lop)||''; await db.from('thu_chi').insert({loai:'thu', danh_muc:'Học phí', so_tien:p.so_tien, ngay:new Date().toISOString().slice(0,10), ghi_chu:((p.hoc_sinh&&p.hoc_sinh.ho_ten)||'')+(lop?' · '+lop:'')+' · CK'}); }
  await Promise.all([loadPayments(), loadThuChi()]);
  if(view==='hoc_phi'){ closeSheets(); renderHocPhi(); }
  else if(curStudent){ openStudentDetail(curStudent); }
  else closeSheets();
  toast('Đã ghi nhận thu '+vnd(p.so_tien)+'đ');
}
async function cancelPhieu(p){
  const {error}=await db.from('thanh_toan').update({trang_thai:'huy'}).eq('id',p.id);
  if(error)return toast(error.message,false);
  await loadPayments();
  if(view==='hoc_phi'){ closeSheets(); renderHocPhi(); }
  else if(curStudent){ openStudentDetail(curStudent); }
  else closeSheets();
  toast('Đã hủy phiếu');
}
function openAssign(u){
  const pend=payments.filter(p=>p.trang_thai==='cho_thanh_toan');
  $('#sheetBody').innerHTML=`
    <div class="achead"><div><div class="atitle">Gán khoản tiền</div><div class="asub">Tiền về +${vnd(u.so_tien)}đ · ND "${u.noi_dung_ck||''}" không tự khớp</div></div><button class="aclose" onclick="closeSheets()"><i class="hgi-stroke hgi-cancel-01"></i></button></div>
    ${pend.length? pend.map(p=>`<div class="actopt" data-id="${p.id}" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:12px;min-width:0"><span class="aoic" style="background:${avaC(p.hoc_sinh?.ma_hoc_sinh||p.hoc_sinh?.ho_ten||'')}">${(p.hoc_sinh?.ho_ten||'').slice(0,1).toUpperCase()}</span><div class="aotxt"><div class="t">${p.hoc_sinh?.ho_ten||''}</div><div class="d">ND: ${p.noi_dung_ck}</div></div></div><div style="display:flex;align-items:center;gap:8px;flex:none"><b style="color:var(--primary)">${vnd(p.so_tien)}đ</b>${p.so_tien===u.so_tien?'<span class="pill dang_hoc">Khớp tiền</span>':''}</div></div>`).join('') : '<div class="state" style="padding:24px"><div class="big">Chưa có phiếu chờ</div>Tạo phiếu trước rồi gán.</div>'}`;
  $('#sheetBody').querySelectorAll('.actopt[data-id]').forEach(o=>o.onclick=async()=>{
    const p=pend.find(x=>x.id===o.dataset.id);
    await db.from('thanh_toan').update({trang_thai:'da_thu', ngay_thanh_toan:new Date().toISOString(), sepay_transaction_id:u.sepay_transaction_id}).eq('id',p.id);
    await db.from('giao_dich_chua_khop').update({trang_thai:'da_gan', thanh_toan_gan_id:p.id}).eq('id',u.id);
    closeSheets(); await Promise.all([loadPayments(), loadUnmatched()]); if(view==='hoc_phi')renderHocPhi(); toast('Đã gán '+vnd(u.so_tien)+'đ');
  });
  show('#sheet');
}

/* ===== plumbing ===== */
let _scrollLockY=0, _scrollLocked=false;
function lockBodyScroll(){
  if(_scrollLocked) return;
  _scrollLockY=window.scrollY||document.documentElement.scrollTop||0;
  document.body.style.position='fixed'; document.body.style.top=`-${_scrollLockY}px`; document.body.style.width='100%';
  _scrollLocked=true;
}
function unlockBodyScroll(){
  if(!_scrollLocked) return;
  document.body.style.position=''; document.body.style.top=''; document.body.style.width='';
  window.scrollTo(0,_scrollLockY); _scrollLocked=false;
}
function show(sel){ lockBodyScroll(); $('#scrim').classList.add('show'); $(sel).classList.add('show'); }
function showAct(){ lockBodyScroll(); $('#actSheet').classList.add('show'); $('#scrim').classList.add('show'); }
function showPage(title){ $('#pageTitle').textContent=title; $('#page').classList.add('show'); }
function closePage(){ $('#page').classList.remove('show'); $('#pageFooter').innerHTML=''; }
$('#pageCancel').onclick=closePage;
function showDetailPage(label){ if(label) $('#detailBackLabel').textContent=label; $('#detailPage').classList.add('show'); }
function closeDetailPage(){ $('#detailPage').classList.remove('show'); }
$('#detailBack').onclick=closeDetailPage;
function showConfirmDialog(title,msg,onConfirm){
  $('#dlgTitle').textContent=title; $('#dlgMsg').textContent=msg;
  $('#dialogScrim').classList.remove('hide');
  $('#dlgConfirm').onclick=()=>{ $('#dialogScrim').classList.add('hide'); onConfirm(); };
}
$('#dlgCancel').onclick=()=>$('#dialogScrim').classList.add('hide');
function closeSheets(){ $('#scrim').classList.remove('show'); $('#sheet').classList.remove('show'); $('#actSheet').classList.remove('show'); unlockBodyScroll(); }
function closeAct(){ $('#actSheet').classList.remove('show'); if(!$('#sheet').classList.contains('show')) unlockBodyScroll(); }
$('#actGrip').onclick=closeAct;
$('#scrim').onclick=()=>{ if($('#actSheet').classList.contains('show')){ closeAct(); if(!$('#sheet').classList.contains('show'))$('#scrim').classList.remove('show'); } else closeSheets(); };
let toastT; function toast(m,ok=true){ $('#toastMsg').textContent=m; $('#toast').className='toast show'+(ok?'':' err'); clearTimeout(toastT); toastT=setTimeout(()=>$('#toast').classList.remove('show'),2400); }
</script>
